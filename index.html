<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>World Cup Draw</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #121212;
      color: white;
      text-align: center;
      padding: 30px;
    }

    h1 {
      color: #00ff9d;
    }

    button {
      background: #00ff9d;
      border: none;
      padding: 15px 30px;
      font-size: 18px;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 20px;
    }

    button:hover {
      opacity: 0.9;
    }

    #result {
      margin-top: 40px;
      font-size: 28px;
      font-weight: bold;
    }

    #remaining {
      margin-top: 30px;
      color: #bbbbbb;
    }

    a {
      color: #00ff9d;
      text-decoration: none;
      display: inline-block;
      margin-top: 30px;
    }
  </style>
</head>

<body>

  <h1>🏆 World Cup Sweepstake Draw</h1>

  <button onclick="drawTeam()">Draw Team</button>

  <div id="result">
    Click the button to begin
  </div>

  <div id="remaining"></div>

  <a href="tracker.html">Go to Live Tracker →</a>

  <script>

    const teams = [
      "Brazil",
      "Spain",
      "Germany",
      "France",
      "Argentina",
      "England"
    ];

    const people = [
      "Liam",
      "Sarah",
      "Tom",
      "Emma",
      "Chris",
      "Dan"
    ];

    let availableTeams = [...teams];
    let availablePeople = [...people];

    function drawTeam() {

      if (availableTeams.length === 0 || availablePeople.length === 0) {
        document.getElementById("result").innerHTML =
          "✅ Draw complete!";
        return;
      }

      const randomTeamIndex =
        Math.floor(Math.random() * availableTeams.length);

      const randomPersonIndex =
        Math.floor(Math.random() * availablePeople.length);

      const selectedTeam =
        availableTeams.splice(randomTeamIndex, 1)[0];

      const selectedPerson =
        availablePeople.splice(randomPersonIndex, 1)[0];

      document.getElementById("result").innerHTML =
        `${selectedPerson} gets <br><br> 🌍 ${selectedTeam}`;

      document.getElementById("remaining").innerHTML =
        `${availableTeams.length} teams remaining`;

    }

  </script>

</body>
</html>
