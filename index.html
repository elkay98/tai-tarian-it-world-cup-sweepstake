<!DOCTYPE html>
<html>
<head>
  <title>T&I World Cup 2026 Sweepstake</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      overflow: hidden;
    }

    .wrapper { display:flex; height:100vh; }

    .left {
      width:40%;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .container {
      text-align:center;
      background:rgba(255,255,255,0.05);
      padding:40px;
      border-radius:20px;
      width:320px;
    }

    button {
      padding:10px 14px;
      margin:5px;
      border:none;
      border-radius:10px;
      background:#3b82f6;
      color:white;
      cursor:pointer;
    }

    #roundLabel {
      margin:10px 0;
      opacity:0.85;
      font-weight:bold;
    }

    #progressWrapper {
      margin-top:12px;
      height:10px;
      width:100%;
      background:rgba(255,255,255,0.1);
      border-radius:10px;
      overflow:hidden;
    }

    #progressBar {
      height:10px;
      width:0%;
      background:#22c55e;
      transition:width 0.3s;
    }

    .right {
      width:60%;
      padding:40px;
      overflow-y:auto;
    }

    .card {
      background:rgba(255,255,255,0.06);
      padding:10px;
      margin-bottom:8px;
      border-radius:10px;
    }

    .flag {
      width:28px;
      height:20px;
      border-radius:3px;
      vertical-align:middle;
      margin:0 6px;
    }

    /* 🔥 FULL SCREEN ROUND OVERLAY */
    #overlay {
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.85);
      display:none;
      align-items:center;
      justify-content:center;
      font-size:48px;
      font-weight:bold;
      z-index:9999;
    }
  </style>
</head>

<body>

<div id="overlay">ROUND 1 COMPLETE</div>

<div class="wrapper">

  <div class="left">
    <div class="container">

      <h2>⚽ T&I World Cup 2026 Sweepstake</h2>

      <div id="roundLabel">Ready</div>

      <button onclick="startDraw()">Start Draw</button>
      <button onclick="togglePause()">Pause / Resume</button>
      <button onclick="randomiseDraw()">Randomise</button>
      <button onclick="reset()">Reset</button>

      <div id="progressWrapper">
        <div id="progressBar"></div>
      </div>

      <div id="result"></div>

    </div>
  </div>

  <div class="right">
    <div id="feed"></div>
  </div>

</div>

<script>

let data;

let people = [];
let teams = [];

let results = {};
let i = 0;
let round = 1;
let paused = false;
let running = false;

const DRAW_SPEED = 2000;

/* ---------------- FLAGS ---------------- */
const flags = {
  "Argentina":"ar","Brazil":"br","England":"gb-eng","France":"fr",
  "Germany":"de","Spain":"es","Portugal":"pt","Netherlands":"nl",
  "USA":"us","Mexico":"mx","Canada":"ca","Belgium":"be",
  "Croatia":"hr","Switzerland":"ch","Denmark":"dk","Austria":"at",
  "Serbia":"rs","Ukraine":"ua","Turkey":"tr","Poland":"pl",
  "Morocco":"ma","Senegal":"sn","Nigeria":"ng","Egypt":"eg",
  "Ghana":"gh","Cameroon":"cm","Algeria":"dz","Ivory Coast":"ci",
  "Japan":"jp","South Korea":"kr","Iran":"ir","Saudi Arabia":"sa",
  "Qatar":"qa","Australia":"au","Uzbekistan":"uz","Iraq":"iq",
  "Panama":"pa","Haiti":"ht","Curaçao":"cw","Cape Verde":"cv",
  "DR Congo":"cd","Tunisia":"tn"
};

function getFlagImg(team){
  const code = flags[team];
  return code ? `<img class="flag" src="https://flagcdn.com/w40/${code}.png">` : "";
}

/* ---------------- START ---------------- */
function startDraw(){

  people = [...data.people].sort(()=>Math.random()-0.5);

  const allTeams = [...data.teams.map(t=>t.name)];

  const round1Teams = allTeams.slice(0, 24);
  const round2Teams = allTeams.slice(24, 48);

  results = {};
  i = 0;
  round = 1;
  paused = false;
  running = true;

  document.getElementById("feed").innerHTML = "";
  document.getElementById("progressBar").style.width = "0%";

  runLoop(people, round1Teams, round2Teams);
}

/* ---------------- LOOP ---------------- */
function runLoop(allPeople, round1Teams, round2Teams){

  if(!running) return;

  if(paused){
    setTimeout(()=>runLoop(allPeople, round1Teams, round2Teams), 300);
    return;
  }

  let teams = round === 1 ? round1Teams : round2Teams;

  if(i >= allPeople.length){

    if(round === 1){
      round = 2;
      i = 0;

      /* 🔥 FULL SCREEN OVERLAY */
      const overlay = document.getElementById("overlay");
      overlay.style.display = "flex";

      setTimeout(()=>{
        overlay.style.display = "none";
        runLoop(allPeople, round1Teams, round2Teams);
      }, 3000);

      return;
    }

    finish();
    return;
  }

  let person = allPeople[i];
  let team = teams.splice(Math.random()*teams.length|0,1)[0];

  if(!results[person.name]){
    results[person.name] = {team1:"",team2:""};
  }

  if(round === 1){
    results[person.name].team1 = team;
  } else {
    results[person.name].team2 = team;
  }

  document.getElementById("roundLabel").innerText =
    round === 1 ? "ROUND 1" : "ROUND 2";

  const div = document.createElement("div");
  div.className = "card";

  /* ✅ ONLY CHANGE: ADD TEAM LABELS */
  div.innerHTML =
    (round === 1 ? "Team 1: " : "Team 2: ") +
    `${person.name} → ${getFlagImg(team)} ${team}`;

  document.getElementById("feed").prepend(div);

  i++;

  document.getElementById("progressBar").style.width =
    (Object.keys(results).length * 2 / 48 * 100) + "%";

  setTimeout(()=>runLoop(allPeople, round1Teams, round2Teams), DRAW_SPEED);
}

/* ---------------- PAUSE ---------------- */
function togglePause(){
  paused = !paused;
  if(!paused && running) startDraw();
}

/* ---------------- RANDOMISE ---------------- */
function randomiseDraw(){

  let p = [...data.people].sort(()=>Math.random()-0.5);
  let t = [...data.teams.map(x=>x.name)];

  results = {};
  document.getElementById("feed").innerHTML = "";

  p.forEach(person=>{

    const team1 = t.splice(Math.random()*t.length|0,1)[0];
    const team2 = t.splice(Math.random()*t.length|0,1)[0];

    results[person.name] = { team1, team2 };

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML =
      `${person.name} → ${getFlagImg(team1)} ${team1} | ${getFlagImg(team2)} ${team2}`;

    document.getElementById("feed").appendChild(div);
  });

  document.getElementById("progressBar").style.width = "100%";
  document.getElementById("roundLabel").innerText = "DRAW COMPLETE";

  save();

  document.getElementById("result").innerHTML = `
    🎉 DRAW COMPLETE<br>
    <button onclick="go()">Go to Tracker</button>
  `;
}

/* ---------------- FINISH ---------------- */
function finish(){

  running = false;
  save();

  document.getElementById("progressBar").style.width = "100%";
  document.getElementById("roundLabel").innerText = "DRAW COMPLETE";

  document.getElementById("result").innerHTML = `
    🎉 DRAW COMPLETE<br>
    <button onclick="go()">Go to Tracker</button>
  `;
}

function go(){
  window.location.href="tracker.html";
}

/* ---------------- RESET ---------------- */
function reset(){
  localStorage.removeItem("sweepstakeResults");
  location.reload();
}

/* ---------------- LOAD ---------------- */
fetch("teams.json")
  .then(r=>r.json())
  .then(j=>data=j);

</script>

</body>
</html>
