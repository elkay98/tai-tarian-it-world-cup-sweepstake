<!DOCTYPE html>
<html>
<head>
  <title>T&I World Cup 2026 Sweepstake</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      overflow: hidden;
    }

    .wrapper { display:flex; height:100vh; }

    .left {
      width:40%;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .container {
      text-align:center;
      background:rgba(255,255,255,0.05);
      padding:40px;
      border-radius:20px;
      width:320px;
    }

    button {
      padding:10px 14px;
      margin:5px;
      border:none;
      border-radius:10px;
      background:#3b82f6;
      color:white;
      cursor:pointer;
    }

    #roundLabel {
      margin:10px 0;
      opacity:0.85;
      font-weight:bold;
    }

    #progressText {
      margin-top:8px;
      font-size:14px;
      opacity:0.95;
      line-height:1.4;
    }

    #progressWrapper {
      margin-top:12px;
      height:10px;
      width:100%;
      background:rgba(255,255,255,0.1);
      border-radius:10px;
      overflow:hidden;
    }

    #progressBar {
      height:10px;
      width:0%;
      background:#22c55e;
      transition:width 0.3s;
    }

    .right {
      width:60%;
      padding:40px;
      overflow-y:auto;
    }

    .card {
      background:rgba(255,255,255,0.06);
      padding:10px;
      margin-bottom:8px;
      border-radius:10px;
    }

    .flag {
      width:28px;
      height:20px;
      border-radius:3px;
      vertical-align:middle;
      margin:0 6px;
    }

    #overlay {
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.85);
      display:none;
      align-items:center;
      justify-content:center;
      font-size:48px;
      font-weight:bold;
      z-index:9999;
    }
  </style>
</head>

<body>

<div id="overlay">ROUND COMPLETE</div>

<div class="wrapper">

  <div class="left">
    <div class="container">

      <h2>⚽ T&I World Cup 2026 Sweepstake</h2>

      <div id="roundLabel">Ready</div>

      <button onclick="startDraw()">Start Draw</button>
      <button onclick="togglePause()">Pause / Resume</button>
      <button onclick="randomiseDraw()">Randomise</button>
      <button onclick="reset()">Reset</button>

      <div id="progressText"></div>

      <div id="progressWrapper">
        <div id="progressBar"></div>
      </div>

      <div id="result"></div>

    </div>
  </div>

  <div class="right">
    <div id="feed"></div>
  </div>

</div>

<script>

let data;
let results = {};
let totalDrawn = 0;

/* ---------------- FLAGS ---------------- */

const flags = {
  "Argentina":"ar","Brazil":"br","England":"gb-eng","France":"fr",
  "Germany":"de","Spain":"es","Portugal":"pt","Netherlands":"nl",
  "USA":"us","Mexico":"mx","Canada":"ca","Belgium":"be",
  "Croatia":"hr","Switzerland":"ch","Denmark":"dk","Austria":"at",
  "Serbia":"rs","Ukraine":"ua","Turkey":"tr","Poland":"pl",
  "Morocco":"ma","Senegal":"sn","Nigeria":"ng","Egypt":"eg",
  "Ghana":"gh","Cameroon":"cm","Algeria":"dz","Ivory Coast":"ci",
  "Japan":"jp","South Korea":"kr","Iran":"ir","Saudi Arabia":"sa",
  "Qatar":"qa","Australia":"au","Uzbekistan":"uz","Iraq":"iq",
  "Panama":"pa","Haiti":"ht","Curaçao":"cw","Cape Verde":"cv",
  "DR Congo":"cd","Tunisia":"tn"
};

function getFlagImg(team){
  const code = flags[team];
  return code
    ? `<img class="flag" src="https://flagcdn.com/w40/${code}.png">`
    : "";
}

/* ---------------- LOAD ---------------- */

fetch("teams.json")
  .then(r=>r.json())
  .then(j=>{
    data = j;

    // ONLY restore AFTER data exists
    if(localStorage.getItem("sweepstakeResults")){
      restoreSavedDraw();
    }
  });

/* ---------------- DRAW LOGIC ---------------- */

function startDraw(){

  if(!data) return alert("Teams not loaded yet");

  results = {};
  totalDrawn = 0;

  localStorage.removeItem("sweepstakeResults");

  const people = [...data.people];
  const teams = [...data.teams];

  shuffle(people);
  shuffle(teams);

  runDraw(people, teams);
}

/* ---------------- CORE DRAW ---------------- */

function runDraw(people, teams){

  let index = 0;

  const interval = setInterval(()=>{

    if(index >= people.length || teams.length < 2){
      clearInterval(interval);
      finishDraw();
      return;
    }

    const person = people[index];

    const team1 = teams.pop();
    const team2 = teams.pop();

    results[person] = { team1, team2 };

    totalDrawn++;

    updateUI();

    index++;

  }, 2000); // keep your requested timing
}

/* ---------------- UI UPDATE ---------------- */

function updateUI(){

  const progress = (totalDrawn / 24) * 100;

  document.getElementById("progressBar").style.width = progress + "%";

  document.getElementById("progressText").innerHTML =
    `${totalDrawn}/24 teams<br>${24-totalDrawn} remaining<br>${Math.round(progress)}% complete`;

  const feed = document.getElementById("feed");

  feed.innerHTML = "";

  Object.keys(results).forEach(name=>{

    const r = results[name];

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <strong>${name}</strong><br><br>

      Team 1: ${getFlagImg(r.team1)} ${r.team1}<br><br>
      Team 2: ${getFlagImg(r.team2)} ${r.team2}
    `;

    feed.appendChild(div);

  });
}

/* ---------------- FINISH ---------------- */

function finishDraw(){

  localStorage.setItem("sweepstakeResults", JSON.stringify(results));

  document.getElementById("overlay").style.display = "flex";

  setTimeout(()=>{

    document.getElementById("overlay").style.display = "none";

    document.getElementById("result").innerHTML =
      `🎉 DRAW COMPLETE<br><br>
       <button onclick="go()">Go to Tracker</button>`;

  }, 2500);
}

/* ---------------- RESTORE ---------------- */

function restoreSavedDraw(){

  results = JSON.parse(localStorage.getItem("sweepstakeResults"));

  updateUI();

  document.getElementById("result").innerHTML =
    `🎉 DRAW COMPLETE<br><br>
     <button onclick="go()">Go to Tracker</button>`;
}

/* ---------------- HELPERS ---------------- */

function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*i);
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
}

function go(){
  window.location.href="tracker.html";
}

function togglePause(){
  alert("Pause will be next upgrade (not broken, just not implemented yet)");
}

function randomiseDraw(){
  startDraw();
}

function reset(){
  localStorage.removeItem("sweepstakeResults");
  location.reload();
}

</script>

</body>
</html>
