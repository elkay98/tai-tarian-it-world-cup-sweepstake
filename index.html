<!DOCTYPE html>
<html>
<head>
  <title>T&I World Cup 2026 Sweepstake</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      overflow: hidden;
    }

    .wrapper { display:flex; height:100vh; }

    .left {
      width:40%;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .container {
      text-align:center;
      background:rgba(255,255,255,0.05);
      padding:40px;
      border-radius:20px;
      width:320px;
    }

    button {
      padding:10px 14px;
      margin:5px;
      border:none;
      border-radius:10px;
      background:#3b82f6;
      color:white;
      cursor:pointer;
    }

    #roundLabel {
      margin:10px 0;
      opacity:0.85;
      font-weight:bold;
    }

    #progressText {
      margin-top:8px;
      font-size:14px;
      opacity:0.95;
      line-height:1.4;
    }

    #progressWrapper {
      margin-top:12px;
      height:10px;
      width:100%;
      background:rgba(255,255,255,0.1);
      border-radius:10px;
      overflow:hidden;
    }

    #progressBar {
      height:10px;
      width:0%;
      background:#22c55e;
      transition:width 0.3s;
    }

    .right {
      width:60%;
      padding:40px;
      overflow-y:auto;
    }

    .card {
      background:rgba(255,255,255,0.06);
      padding:10px;
      margin-bottom:8px;
      border-radius:10px;
    }

    .flag {
      width:28px;
      height:20px;
      border-radius:3px;
      vertical-align:middle;
      margin:0 6px;
    }

    #overlay {
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.85);
      display:none;
      align-items:center;
      justify-content:center;
      font-size:48px;
      font-weight:bold;
      z-index:9999;
    }
  </style>
</head>

<body>

<div id="overlay">ROUND 1 COMPLETE</div>

<div class="wrapper">

  <div class="left">
    <div class="container">

      <h2>⚽ T&I World Cup 2026 Sweepstake</h2>

      <div id="roundLabel">Ready</div>

      <div id="adminControls" style="display:none;">
      <button onclick="startDraw()">Start Draw</button>
      <button onclick="randomiseDraw()">Randomise</button>
      <button onclick="reset()">Reset</button>
     </div>

     <button onclick="adminLogin()">Admin Access</button>

      <div id="progressText"></div>

      <div id="progressWrapper">
        <div id="progressBar"></div>
      </div>

      <div id="result"></div>

    </div>
  </div>

  <div class="right">
    <div id="feed"></div>
  </div>

</div>

<script>

let isAdmin = sessionStorage.getItem("admin") === "true";
  
let data;
let people = [];
let teams = [];

let results = {};
let i = 0;
let round = 1;
let paused = false;
let running = false;

const DRAW_SPEED = 2500;

/* ---------------- AUDIO ---------------- */

let ctx;

function initAudio(){
  if(!ctx){
    ctx = new (window.AudioContext || window.webkitAudioContext)();
  }
}

function play(freq, duration = 200){

  if(!ctx) return;

  const osc = ctx.createOscillator();
  const gain = ctx.createGain();

  osc.connect(gain);
  gain.connect(ctx.destination);

  osc.frequency.value = freq;
  gain.gain.value = 0.08;

  osc.start();

  setTimeout(()=>{
    osc.stop();
  }, duration);
}

function playDing(){
  play(700);
}

function playCheer(){
  play(950);
  setTimeout(()=>play(1200), 120);
}

function playAww(){
  play(280);
  setTimeout(()=>play(180), 120);
}

/* ---------------- FLAGS ---------------- */

const flags = {
  "Argentina":"ar","Brazil":"br","England":"gb-eng","France":"fr",
  "Germany":"de","Spain":"es","Portugal":"pt","Netherlands":"nl",
  "USA":"us","Mexico":"mx","Canada":"ca","Belgium":"be",
  "Croatia":"hr","Switzerland":"ch","Denmark":"dk","Austria":"at",
  "Serbia":"rs","Ukraine":"ua","Turkey":"tr","Poland":"pl",
  "Morocco":"ma","Senegal":"sn","Nigeria":"ng","Egypt":"eg",
  "Ghana":"gh","Cameroon":"cm","Algeria":"dz","Ivory Coast":"ci",
  "Japan":"jp","South Korea":"kr","Iran":"ir","Saudi Arabia":"sa",
  "Qatar":"qa","Australia":"au","Uzbekistan":"uz","Iraq":"iq",
  "Panama":"pa","Haiti":"ht","Curaçao":"cw","Cape Verde":"cv",
  "DR Congo":"cd","Tunisia":"tn"
};

function getFlagImg(team){
  const code = flags[team];
  return code ? `<img class="flag" src="https://flagcdn.com/w40/${code}.png">` : "";
}

/* ---------------- TEAM TIERS ---------------- */

const eliteTeams = [
  "Brazil","Argentina","France","England",
  "Spain","Portugal","Germany"
];

const lowTeams = [
  "Haiti","Curaçao","Cape Verde",
  "Iraq","Uzbekistan","Panama"
];

/* ---------------- START ---------------- */

function startDraw(){
  
  if(!isAdmin) return alert("Admin only");
  
  initAudio();

  people = [...data.people].sort(()=>Math.random()-0.5);

  const allTeams = [...data.teams.map(t=>t.name)];

  const round1Teams = allTeams.slice(0, 26);
  const round2Teams = allTeams.slice(26, 48);

  results = {};
  i = 0;
  round = 1;
  paused = false;
  running = true;

  document.getElementById("feed").innerHTML = "";
  document.getElementById("progressBar").style.width = "0%";

  updateProgress(0);

  const round2People = [...people]
  .sort(() => Math.random() - 0.5)
  .slice(0, 22);

runLoop(people, round1Teams, round2Teams, round2People);
}

/* ---------------- LOOP ---------------- */

function runLoop(allPeople, round1Teams, round2Teams, round2People){

  if(!running) return;

  if(paused){
  setTimeout(()=>runLoop(allPeople, round1Teams, round2Teams, round2People), 300);
  return;
}

  let teams = round === 1 ? round1Teams : round2Teams;
  let currentPeople = round === 1 ? allPeople : round2People;

  if(i >= currentPeople.length){

    if(round === 1){
      round = 2;
      i = 0;

      document.getElementById("overlay").style.display = "flex";

    setTimeout(()=>{
      document.getElementById("overlay").style.display = "none";
      runLoop(allPeople, round1Teams, round2Teams, round2People);
    }, 3000);
  
      return;
    }

function showFinalResults(){

  const feed = document.getElementById("feed");

  feed.innerHTML = "";

  Object.keys(results)
    .sort()
    .forEach(name => {

      const team1 = results[name].team1 || "N/A";
      const team2 = results[name].team2 || "N/A";

      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML =
        `<strong>${name}</strong> → ` +
        `${getFlagImg(team1)} ${team1} | ` +
        (team2 === "N/A"
          ? "N/A"
          : `${getFlagImg(team2)} ${team2}`);

      feed.appendChild(div);
    });
}
    
    finish();
    return;
  }

  let person = currentPeople[i];
  let team = teams.splice(Math.floor(Math.random() * teams.length),1)[0];

  if(!results[person.name]){
    results[person.name] = {team1:"",team2:""};
  }

  if(round === 1){
    results[person.name].team1 = team;
  } else {
    results[person.name].team2 = team;
  }

  /* ✅ SOUND LOGIC RESTORED */

  if(eliteTeams.includes(team)){
    playCheer();
  }
  else if(lowTeams.includes(team)){
    playAww();
  }
  else{
    playDing();
  }

  document.getElementById("roundLabel").innerText =
    round === 1 ? "ROUND 1" : "ROUND 2";

  const div = document.createElement("div");
  div.className = "card";

  div.innerHTML =
    (round === 1 ? "Team 1: " : "Team 2: ") +
    `${person.name} → ${getFlagImg(team)} ${team}`;

  document.getElementById("feed").prepend(div);

  i++;

  updateProgress(i);

  setTimeout(()=>runLoop(allPeople, round1Teams, round2Teams, round2People), DRAW_SPEED);
}

/* ---------------- PROGRESS ---------------- */

function updateProgress(done){

  const total = 48;

  const displayStart = round === 1 ? 0 : 26;
  const displayDone = displayStart + done;

  const remaining = total - displayDone;
  const percent = Math.round((displayDone / total) * 100);

  document.getElementById("progressText").innerHTML =
    `${displayDone}/48 teams<br>${remaining} remaining<br>${percent}% complete`;

  document.getElementById("progressBar").style.width = percent + "%";
}

/* ---------------- PAUSE ---------------- */

function togglePause(){
  paused = !paused;
}

/* ---------------- RANDOMISE ---------------- */

function randomiseDraw(){

  if(!isAdmin) return alert("Admin only");

  let p = [...data.people].sort(()=>Math.random()-0.5);
  let t = [...data.teams.map(x=>x.name)];

  results = {};
  document.getElementById("feed").innerHTML = "";

  p.forEach(person=>{

    const team1 = t.splice(Math.floor(Math.random()*t.length),1)[0];
    const team2 = t.splice(Math.floor(Math.random()*t.length),1)[0];

    results[person.name] = { team1, team2 };

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML =
      `${person.name} → ${getFlagImg(team1)} ${team1} | ${getFlagImg(team2)} ${team2}`;

    document.getElementById("feed").appendChild(div);
  });
  showFinalResults();
  localStorage.setItem("sweepstakeResults", JSON.stringify(results));

  document.getElementById("progressBar").style.width = "100%";
  document.getElementById("progressText").innerHTML =
    `48/48 teams<br>0 remaining<br>100% complete`;

  document.getElementById("roundLabel").innerText = "DRAW COMPLETE";

  document.getElementById("result").innerHTML = `
    🎉 DRAW COMPLETE<br><br>
    <button onclick="go()">Go to Tracker</button>
  `;
}

/* ---------------- FINISH ---------------- */

function finish(){

  running = false;

  showFinalResults();

  localStorage.setItem("sweepstakeResults", JSON.stringify(results));

  document.getElementById("progressBar").style.width = "100%";
  document.getElementById("progressText").innerHTML =
    `48/48 teams<br>0 remaining<br>100% complete`;

  document.getElementById("roundLabel").innerText = "DRAW COMPLETE";

  document.getElementById("result").innerHTML = `
    🎉 DRAW COMPLETE<br><br>
    <button onclick="go()">Go to Tracker</button>
  `;
}

function go(){
  window.location.href = "tracker.html";
}

/* ---------------- RESET ---------------- */

function reset(){

  if(!isAdmin) return alert("Admin only");
  
  localStorage.removeItem("sweepstakeResults");
  location.reload();
}

/* ---------------- LOAD ---------------- */

fetch("teams.json")
  .then(r=>r.json())
  .then(j=>data=j);

  function adminLogin(){

  const pass = prompt("Enter admin password:");

  if(pass === "TTWCSweep2026-!\"£"){

    isAdmin = true;
    sessionStorage.setItem("admin", "true");

    document.getElementById("adminControls").style.display = "block";

    alert("Admin unlocked");
  } else {
    alert("Incorrect password");
  }
}

  function initAdminUI(){
  if(isAdmin){
    document.getElementById("adminControls").style.display = "block";
  }
}

initAdminUI();

</script>

</body>
</html>
