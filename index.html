<!DOCTYPE html>
<html>
<head>
  <title>T&I World Cup 2026 Sweepstake</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      overflow: hidden;
    }

    .wrapper { display:flex; height:100vh; }

    .left {
  width:40%;
  display:flex;
  justify-content:flex-start;
  align-items:flex-start;
  padding:40px;
  box-sizing:border-box;
    }

    .container {
      text-align:center;
      background:rgba(255,255,255,0.05);
      padding:40px;
      border-radius:20px;
      width:320px;
    }

    button {
      padding:10px 14px;
      margin:5px;
      border:none;
      border-radius:10px;
      background:#3b82f6;
      color:white;
      cursor:pointer;
    }

    #roundLabel {
      margin:10px 0;
      opacity:0.85;
      font-weight:bold;
    }

    #progressText {
      margin-top:8px;
      font-size:14px;
      opacity:0.95;
      line-height:1.4;
    }

    #progressWrapper {
      margin-top:12px;
      height:10px;
      width:100%;
      background:rgba(255,255,255,0.1);
      border-radius:10px;
      overflow:hidden;
    }

    #progressBar {
      height:10px;
      width:0%;
      background:#22c55e;
      transition:width 0.3s;
    }

    .right {
      width:60%;
      padding:40px;
      overflow-y:auto;
    }

    .card {
      background:rgba(255,255,255,0.06);
      padding:10px;
      margin-bottom:8px;
      border-radius:10px;
    }

    .flag {
      width:22px;
      height:16px;
      border-radius:3px;
      vertical-align:middle;
      margin:0 6px;
    }

    #overlay {
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.85);
      display:none;
      align-items:center;
      justify-content:center;
      font-size:48px;
      font-weight:bold;
      z-index:9999;
    }
  </style>
</head>

<body>

<div id="overlay">ROUND 1 COMPLETE</div>

<div class="wrapper">

  <div class="left">
    <div class="container">

      <h2>⚽ T&I World Cup 2026 Sweepstake</h2>

      <div id="roundLabel">Ready</div>

      <div id="adminControls" style="display:none;">
        <button onclick="startDraw()">Start Draw</button>
        <button onclick="randomiseDraw()">Randomise</button>
        <button onclick="reset()">Reset</button>
      </div>

      <button id="adminButton" onclick="adminLogin()">Admin Access</button>

      <div id="progressText"></div>

      <div id="progressWrapper">
        <div id="progressBar"></div>
      </div>
      
      <div id="result"></div>

      <div id="trackerLink"></div>

    </div>
  </div>

  <div class="right">
    <div id="feed"></div>
  </div>

</div>

<script>

let isAdmin = sessionStorage.getItem("admin") === "true";
let data = null;

let people = [];
let results = {};
let i = 0;
let round = 1;
let paused = false;
let running = false;

const DRAW_SPEED = 2500;

/* ---------- AUDIO SYSTEM ---------- */
let ctx;

function initAudio(){
  if(!ctx){
    ctx = new (window.AudioContext || window.webkitAudioContext)();
  }
}

document.body.addEventListener("click", initAudio, { once:true });

function play(freq, duration = 200){
  if(!ctx) return;

  const osc = ctx.createOscillator();
  const gain = ctx.createGain();

  osc.connect(gain);
  gain.connect(ctx.destination);

  osc.frequency.value = freq;
  gain.gain.value = 0.08;

  osc.start();
  setTimeout(()=>osc.stop(), duration);
}

/* sound types */
function playDing(){ play(700); }
function playCheer(){ play(950); setTimeout(()=>play(1200),120); }
function playAww(){ play(280); setTimeout(()=>play(180),120); }

/* ---------- FLAGS ---------- */
const flags = {
  "Argentina": "ar",
  "Brazil": "br",
  "England": "gb-eng",
  "France": "fr",
  "Germany": "de",
  "Spain": "es",
  "Portugal": "pt",
  "Netherlands": "nl",

  "Belgium": "be",
  "Croatia": "hr",
  "Uruguay": "uy",
  "Switzerland": "ch",
  "Czechia": "cz",
  "Austria": "at",
  "Ecuador": "ec",
  "Scotland": "gb-sct",
  "Turkey": "tr",
  "Sweden": "se",
  "USA": "us",
  "Mexico": "mx",
  "Canada": "ca",
  "Morocco": "ma",
  "Senegal": "sn",
  "Norway": "no",
  "Egypt": "eg",
  "Ghana": "gh",
  "Bosnia & Herzegovina": "ba",
  "Algeria": "dz",
  "Ivory Coast": "ci",
  "South Africa": "za",
  "Japan": "jp",
  "South Korea": "kr",
  "Iran": "ir",
  "Saudi Arabia": "sa",
  "Qatar": "qa",
  "Australia": "au",
  "Jordan": "jo",
  "Costa Rica": "cr",
  "Honduras": "hn",
  "Colombia": "co",
  "Paraguay": "py",
  "New Zealand": "nz",

  "Uzbekistan": "uz",
  "Iraq": "iq",
  "Panama": "pa",
  "Haiti": "ht",
  "Curaçao": "cw",
  "Cape Verde": "cv",
  "DR Congo": "cd",
  "Tunisia": "tn"
};

function getFlagImg(team){
  return flags[team]
    ? `<img class="flag" src="https://flagcdn.com/w40/${flags[team]}.png">`
    : "";
}
  
/* ---------- ADMIN ---------- */
  const ADMIN_PASSWORD = 'TTWCSweep2026-!"£';

  function adminLogin(){
  const pass = prompt("Enter admin password:");

  if(pass === ADMIN_PASSWORD){
    isAdmin = true;
    sessionStorage.setItem("admin","true");
    document.getElementById("adminControls").style.display = "block";
    document.getElementById("adminButton").style.display = "none";
    alert("Admin unlocked");
  } else {
    alert("Incorrect password");
  }
}

function showSavedResults(){

  const savedResults = localStorage.getItem("sweepstakeResults");
  const drawComplete = localStorage.getItem("drawComplete");

  if(!savedResults || drawComplete !== "true"){
    return;
  }

  const saved = JSON.parse(savedResults);

  const feed = document.getElementById("feed");
  feed.innerHTML = "";

  Object.keys(saved)
    .sort()
    .forEach(name => {

      const team1 = saved[name].team1 || "N/A";
      const team2 = saved[name].team2 || "N/A";

      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML =
        `<strong>${name}</strong> → ` +
        `${getFlagImg(team1)} ${team1} | ` +
        `${getFlagImg(team2)} ${team2}`;

      feed.appendChild(div);
    });

  document.getElementById("roundLabel").innerText = "DRAW COMPLETE";

  document.getElementById("progressText").innerHTML =
    `48/48 teams<br>0 remaining<br>100% complete`;

  document.getElementById("progressBar").style.width = "100%";

  document.getElementById("result").innerHTML = `
    🎉 DRAW COMPLETE<br><br>
    <button onclick="go()">Go to Tracker</button>
  `;
}
  
function initAdminUI(){

  if(isAdmin){

    document.getElementById("adminControls").style.display = "block";

    const btn = document.getElementById("adminButton");
    if(btn) btn.style.display = "none";
  }
}

/* ---------- START ---------- */
function startDraw(){

  if(!isAdmin) return alert("Admin only");
  if(!data) return alert("Teams still loading...");

  initAudio();

  people = [...data.people].sort(()=>Math.random()-0.5);

  const allTeams = [...data.teams.map(t => t.name)]
  .sort(() => Math.random() - 0.5);

  const round1Teams = allTeams.slice(0,24);
  const round2Teams = allTeams.slice(24,48);

  results = {};
  i = 0;
  round = 1;
  running = true;

  document.getElementById("feed").innerHTML = "";
  document.getElementById("progressBar").style.width = "0%";
  updateProgress(0);

  runLoop(people, round1Teams, round2Teams);
}

/* ---------- LOOP ---------- */
function runLoop(allPeople, round1Teams, round2Teams){

  if(!running) return;

  let teams = round === 1 ? round1Teams : round2Teams;

  if(i >= allPeople.length){

    if(round === 1){

  round = 2;
  i = 0;

  document.getElementById("overlay").style.display = "flex";

      setTimeout(()=>{
        document.getElementById("overlay").style.display = "none";
        runLoop(allPeople, round1Teams, round2Teams);
      }, 2000);

      return;
    }

    finish();
    return;
  }

  let person = allPeople[i];
  let team = teams.splice(Math.floor(Math.random()*teams.length),1)[0];

  if(!team){
  team = "N/A";
}

  if(!results[person.name]){
    results[person.name] = {team1:"",team2:""};
  }

  if(round === 1){
  results[person.name].team1 = team;
 } else {
  results[person.name].team2 = team || "N/A";
 }

  /* ---------- SOUND PER PICK ---------- */
  if(["Brazil","Argentina","France","England","Spain","Portugal","Germany"].includes(team)){
    playCheer();
  } else if(["Haiti","Curaçao","Cape Verde","Iraq","Uzbekistan","Panama","N/A"].includes(team)){
    playAww();
  } else {
    playDing();
  }

  const label = (round === 1) ? "Team 1" : "Team 2";

  document.getElementById("feed").prepend(
    Object.assign(document.createElement("div"), {
      className:"card",
      innerHTML:`${label}: ${person.name} → ${getFlagImg(team)} ${team}`
    })
  );

  i++;
  updateProgress(i);

  setTimeout(()=>runLoop(allPeople, round1Teams, round2Teams), DRAW_SPEED);
}

/* ---------- PROGRESS ---------- */
function updateProgress(done){

  const total = 48;

  const displayStart = round === 1 ? 0 : 24;
  const displayDone = displayStart + done;

  const remaining = total - displayDone;
  const percent = Math.round((displayDone / total) * 100);

  document.getElementById("progressText").innerHTML =
    `${displayDone}/48 teams<br>${remaining} remaining<br>${percent}% complete`;

  document.getElementById("progressBar").style.width = percent + "%";
}

/* ---------- FINISH ---------- */
function finish(){

  running = false;

  localStorage.setItem("sweepstakeResults", JSON.stringify(results));
  localStorage.setItem("drawComplete","true");

  document.getElementById("roundLabel").innerText = "DRAW COMPLETE";

  document.getElementById("result").innerHTML = `
    🎉 DRAW COMPLETE<br><br>
    <button onclick="go()">Go to Tracker</button>
  `;
}

function go(){
  window.location.href = "tracker.html";
}

  function showTrackerButton(){

  if(localStorage.getItem("drawComplete") === "true"){

    document.getElementById("trackerLink").innerHTML = `
      <button onclick="go()">
        📊 Go to Live Tracker
      </button>
    `;
  }
}

/* ---------- RANDOMISE ---------- */
function randomiseDraw(){

  if(!isAdmin) return alert("Admin only");

  let p = [...data.people].sort(()=>Math.random()-0.5);
  let t = data.teams.map(x=>x.name);

  results = {};
  document.getElementById("feed").innerHTML = "";

  p.forEach(person=>{
    const t1 = t.splice(Math.random()*t.length|0,1)[0];
    const t2 = t.splice(Math.random()*t.length|0,1)[0];

    results[person.name] = {team1:t1,team2:t2};

    document.getElementById("feed").innerHTML +=
      `<div class="card">${person.name} → ${getFlagImg(t1)} ${t1} | ${getFlagImg(t2)} ${t2}</div>`;
  });

  localStorage.setItem("sweepstakeResults", JSON.stringify(results));

  localStorage.setItem("drawComplete","true");
}

/* ---------- RESET ---------- */
function reset(){

  if(!isAdmin) return alert("Admin only");

  const pass = prompt("Enter admin password to confirm reset:");

  if(pass !== ADMIN_PASSWORD){
    alert("Reset cancelled");
    return;
  }

  localStorage.clear();
  location.reload();
}

/* ---------- LOAD ---------- */
fetch("teams.json")
  .then(r=>r.json())
  .then(j=>data=j);

/* ---------- INIT ---------- */
initAdminUI();

if(localStorage.getItem("drawComplete") === "true"){
  showTrackerButton();
  showSavedResults();
}

</script>

</body>
</html>
