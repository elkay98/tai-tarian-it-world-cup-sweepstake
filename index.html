<!DOCTYPE html>
<html>
<head>
  <title>T&I World Cup 2026 Sweepstake</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      overflow: hidden;
    }

    .wrapper {
      display: flex;
      height: 100vh;
    }

    .left {
      width: 40%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      text-align: center;
      background: rgba(255,255,255,0.05);
      padding: 40px;
      border-radius: 20px;
      width: 320px;
    }

    button {
      padding: 10px 16px;
      margin: 5px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: #3b82f6;
      color: white;
    }

    .result {
      margin-top: 20px;
      font-size: 20px;
      min-height: 60px;
    }

    #bigFlag {
      font-size: 80px;
      margin-top: 20px;
      opacity: 0;
      transform: translateY(20px) scale(0.8);
      transition: all 0.6s ease;
    }

    #bigFlag.show {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .right {
      width: 60%;
      padding: 40px;
      overflow-y: auto;
    }

    .card {
      background: rgba(255,255,255,0.06);
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 10px;
    }

    #adminPanel {
      display: none;
      margin-top: 10px;
    }

    /* 📊 PROGRESS (hidden until login) */
    #progressWrapper {
      margin-top: 12px;
      width: 100%;
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
      height: 10px;
      overflow: hidden;
      display: none;
    }

    #progressBar {
      height: 10px;
      width: 0%;
      background: #22c55e;
      transition: width 0.4s ease;
    }

    #progressText {
      font-size: 12px;
      margin-top: 6px;
      opacity: 0.8;
      display: none;
    }
  </style>
</head>

<body>

<div class="wrapper">

  <div class="left">
    <div class="container">

      <h1>⚽ T&I World Cup 2026 Sweepstake</h1>

      <input type="password" id="adminPass" placeholder="Admin password">
      <button onclick="unlockAdmin()">Unlock</button>

      <div id="adminPanel">
        <button onclick="startDraw()">Start Draw</button>
        <button onclick="togglePause()" id="pauseBtn">Pause</button>
        <button onclick="resetDraw()">Reset</button>
      </div>

      <!-- 📊 PROGRESS -->
      <div id="progressWrapper">
        <div id="progressBar"></div>
      </div>
      <div id="progressText">0% complete</div>

      <div id="result" class="result"></div>
      <div id="bigFlag"></div>

    </div>
  </div>

  <div class="right">
    <div id="feed"></div>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import {
  getFirestore,
  doc,
  setDoc
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDgzUhc-cVSoPAejfxV-pHUC2jAZIxTAXw",
  authDomain: "tt-world-cup-sweepstake.firebaseapp.com",
  projectId: "tt-world-cup-sweepstake",
  storageBucket: "tt-world-cup-sweepstake.firebasestorage.app",
  messagingSenderId: "786742826315",
  appId: "1:786742826315:web:9fd75b68ad277f5173c4ce"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.db = db;
window.firebaseSet = setDoc;
window.firebaseDoc = doc;
</script>

<script>
let data;
let running = false;
let paused = false;
let ctx;
let totalPeople = 0;
let completed = 0;

const ADMIN_PASSWORD = 'TTWCSweep2026-!"£';

/* 🔐 ADMIN LOGIN */
function unlockAdmin(){
  const input = document.getElementById("adminPass").value;

  if(input === ADMIN_PASSWORD){

    document.getElementById("adminPass").style.display = "none";
    document.querySelector("button[onclick='unlockAdmin()']").style.display = "none";
    document.getElementById("adminPanel").style.display = "block";

    // ✅ SHOW PROGRESS ONLY AFTER LOGIN
    document.getElementById("progressWrapper").style.display = "block";
    document.getElementById("progressText").style.display = "block";

  } else {
    alert("Wrong password");
  }
}

/* ⏸ PAUSE */
function togglePause(){
  paused = !paused;
  document.getElementById("pauseBtn").innerText =
    paused ? "Resume" : "Pause";
}

/* 📊 PROGRESS */
function updateProgress(){
  const percent = Math.round((completed / totalPeople) * 100);

  document.getElementById("progressBar").style.width = percent + "%";
  document.getElementById("progressText").innerText =
    percent + "% complete (" + completed + "/" + totalPeople + ")";
}

/* 🔊 AUDIO SYSTEM (UNCHANGED - WORKING) */
function initAudio(){
  ctx = new (window.AudioContext || window.webkitAudioContext)();
}

function tone(freq, duration=250, volume=0.12){
  const o = ctx.createOscillator();
  const g = ctx.createGain();

  o.type = "sine";

  o.connect(g);
  g.connect(ctx.destination);

  o.frequency.value = freq;
  g.gain.value = volume;

  o.start();
  setTimeout(()=>o.stop(), duration);
}

/* 🟡 MID */
function playDing(){
  tone(660, 180, 0.10);
}

/* 🟢 ELITE */
function playCheer(){
  tone(520, 220, 0.12);
  setTimeout(()=>tone(780, 220, 0.12), 120);
  setTimeout(()=>tone(1040, 300, 0.14), 240);
}

/* 🔴 LOW */
function playAww(){
  tone(420, 220, 0.12);
  setTimeout(()=>tone(260, 260, 0.10), 140);
}

/* 🎺 DRUMROLL */
function drumroll(){
  tone(110, 120);
  setTimeout(()=>tone(130,120),140);
  setTimeout(()=>tone(100,120),280);
}

/* 🏳️ FLAGS */
const flags = {
  "Argentina":"🇦🇷","Brazil":"🇧🇷","England":"🏴","France":"🇫🇷",
  "Germany":"🇩🇪","Spain":"🇪🇸","Portugal":"🇵🇹","Netherlands":"🇳🇱",
  "USA":"🇺🇸","Mexico":"🇲🇽","Canada":"🇨🇦",
  "Belgium":"🇧🇪","Croatia":"🇭🇷","Switzerland":"🇨🇭","Denmark":"🇩🇰",
  "Austria":"🇦🇹","Serbia":"🇷🇸","Ukraine":"🇺🇦","Turkey":"🇹🇷",
  "Poland":"🇵🇱","Morocco":"🇲🇦","Senegal":"🇸🇳","Nigeria":"🇳🇬",
  "Egypt":"🇪🇬","Ghana":"🇬🇭","Cameroon":"🇨🇲","Algeria":"🇩🇿",
  "Ivory Coast":"🇨🇮","Japan":"🇯🇵","South Korea":"🇰🇷",
  "Iran":"🇮🇷","Saudi Arabia":"🇸🇦","Qatar":"🇶🇦",
  "Australia":"🇦🇺","Uzbekistan":"🇺🇿","Iraq":"🇮🇶",
  "Panama":"🇵🇦","Haiti":"🇭🇹","Curaçao":"🇨🇼","Cape Verde":"🇨🇻",
  "DR Congo":"🇨🇩","Tunisia":"🇹🇳"
};

/* ⚽ DRAW */
function startDraw(){
  if(running) return;
  running = true;

  if(!ctx) initAudio();

  let people = [...data.people];
  let teams = data.teams.map(t => t.name);

  totalPeople = people.length;
  completed = 0;
  updateProgress();

  let i = 0;

  function step(){
    if(i >= people.length) return;

    if(paused){
      setTimeout(step, 500);
      return;
    }

    const person = people[i];

    const team = teams.splice(
      Math.floor(Math.random() * teams.length),
      1
    )[0];

    drumroll();

    document.getElementById("result").innerText = "Drawing...";

    setTimeout(() => {

      const flag = flags[team] || "🏳️";

      document.getElementById("result").innerText =
        person.name + " → " + flag + " " + team;

      const div = document.createElement("div");
      div.className = "card";
      div.innerText = person.name + " → " + flag + " " + team;

      document.getElementById("feed").prepend(div);

      completed++;
      updateProgress();

      if(["Argentina","Brazil","France","England","Spain","Germany","Portugal","Netherlands"].includes(team)){
        playCheer();
      }
      else if(["Haiti","Cape Verde","Curaçao"].includes(team)){
        playAww();
      }
      else {
        playDing();
      }

    }, 1500);

    i++;
    setTimeout(step, 2200);
  }

  step();
}

/* 🧨 RESET */
function resetDraw(){
  if(!confirm("Reset everything?")) return;

  document.getElementById("feed").innerHTML = "";
  document.getElementById("result").innerText = "";

  completed = 0;
  updateProgress();

  alert("Reset complete");
}

/* 📦 LOAD */
fetch("teams.json")
  .then(r => r.json())
  .then(j => data = j);
</script>

</body>
</html>
