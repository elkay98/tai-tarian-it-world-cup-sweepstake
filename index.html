<!DOCTYPE html>
<html>
<head>
  <title>T&I World Cup 2026 Sweepstake</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      overflow: hidden;
    }

    .wrapper {
      display: flex;
      height: 100vh;
    }

    .left {
      width: 40%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      text-align: center;
      background: rgba(255,255,255,0.05);
      padding: 40px;
      border-radius: 20px;
      width: 320px;
    }

    button {
      padding: 10px 16px;
      margin: 5px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: #3b82f6;
      color: white;
    }

    .result {
      margin-top: 20px;
      font-size: 20px;
      min-height: 60px;
    }

    #mainFlag {
      font-size: 90px;
      margin: 15px 0;
      opacity: 0;
      transform: scale(0.7);
      transition: all 0.5s ease;
    }

    #mainFlag.show {
      opacity: 1;
      transform: scale(1);
    }

    .flag {
      width: 28px;
      height: 20px;
      border-radius: 3px;
      object-fit: cover;
      box-shadow: 0 0 2px rgba(0,0,0,0.4);
    }

    .teamCell {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .right {
      width: 60%;
      padding: 40px;
      overflow-y: auto;
    }

    .card {
      background: rgba(255,255,255,0.06);
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 10px;
    }

    #progressWrapper {
      margin-top: 12px;
      width: 100%;
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
      height: 10px;
      overflow: hidden;
    }

    #progressBar {
      height: 10px;
      width: 0%;
      background: #22c55e;
      transition: width 0.4s ease;
    }
  </style>
</head>

<body>

<div class="wrapper">

  <div class="left">

    <div class="container">

      <h1>⚽ T&I World Cup 2026 Sweepstake</h1>

      <div id="mainFlag"></div>

      <button onclick="startDraw()">Start Draw</button>
      <button onclick="randomiseDraw()">Randomise Draw</button>
      <button onclick="resetDraw()">Reset</button>

      <div id="progressWrapper">
        <div id="progressBar"></div>
      </div>

      <div id="result" class="result"></div>

    </div>

  </div>

  <div class="right">
    <div id="feed"></div>
  </div>

</div>

<script>

let data;
let remainingTeams = [];
let finalResults = {};
let completed = 0;

const flags = {
  "Argentina":"ar",
  "Brazil":"br",
  "England":"gb-eng",
  "France":"fr",
  "Germany":"de",
  "Spain":"es",
  "Portugal":"pt",
  "Netherlands":"nl",
  "USA":"us",
  "Mexico":"mx",
  "Canada":"ca",
  "Belgium":"be",
  "Croatia":"hr",
  "Switzerland":"ch",
  "Denmark":"dk",
  "Austria":"at",
  "Serbia":"rs",
  "Ukraine":"ua",
  "Turkey":"tr",
  "Poland":"pl",
  "Morocco":"ma",
  "Senegal":"sn",
  "Nigeria":"ng",
  "Egypt":"eg",
  "Ghana":"gh",
  "Cameroon":"cm",
  "Algeria":"dz",
  "Ivory Coast":"ci",
  "Japan":"jp",
  "South Korea":"kr",
  "Iran":"ir",
  "Saudi Arabia":"sa",
  "Qatar":"qa",
  "Australia":"au",
  "Uzbekistan":"uz",
  "Iraq":"iq",
  "Panama":"pa",
  "Haiti":"ht",
  "Curaçao":"cw",
  "Cape Verde":"cv",
  "DR Congo":"cd",
  "Tunisia":"tn"
};

function flag(team){
  const code = flags[team];
  return code ? `https://flagcdn.com/w40/${code}.png` : "";
}

/* 🎬 NORMAL ANIMATED DRAW */
function startDraw(){

  let people = [...data.people];
  people.sort(() => Math.random() - 0.5);

  if(remainingTeams.length === 0){
    remainingTeams = data.teams.map(t => t.name);
  }

  let i = 0;

  function step(){

    if(i >= people.length) return;

    const person = people[i];

    const team = remainingTeams.splice(
      Math.floor(Math.random() * remainingTeams.length),
      1
    )[0];

    assignResult(person, team);

    i++;
    setTimeout(step, 1500);
  }

  step();
}

/* ⚡ INSTANT FULL RANDOM DRAW */
function randomiseDraw(){

  let people = [...data.people];
  people.sort(() => Math.random() - 0.5);

  let teams = [...data.teams.map(t => t.name)];

  finalResults = {};
  remainingTeams = [...teams];
  completed = 0;

  people.forEach(person => {

    const team = teams.splice(
      Math.floor(Math.random() * teams.length),
      1
    )[0];

    assignResult(person, team, true);

  });

  document.getElementById("progressBar").style.width = "100%";
}

/* 🧠 CORE ASSIGNMENT */
function assignResult(person, team, instant=false){

  if(!finalResults[person.name]){
    finalResults[person.name] = { team1:"", team2:"" };
  }

  finalResults[person.name].team1 =
    finalResults[person.name].team1 || team;

  if(finalResults[person.name].team1 !== team){
    finalResults[person.name].team2 = team;
  }

  const div = document.createElement("div");
  div.className = "card";

  div.innerHTML =
    person.name + " → " +
    `<img class="flag" src="${flag(team)}"> ` +
    team;

  document.getElementById("feed").prepend(div);

  completed++;

  document.getElementById("progressBar").style.width =
    (completed / data.people.length * 100) + "%";

  if(!instant){
    document.getElementById("result").innerHTML =
      person.name + " → " +
      `<img class="flag" src="${flag(team)}"> ` +
      team;
  }
}

function resetDraw(){
  location.reload();
}

fetch("teams.json")
  .then(r => r.json())
  .then(j => data = j);

</script>

</body>
</html>
