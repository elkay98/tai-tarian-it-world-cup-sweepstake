<!DOCTYPE html>
<html>
<head>
  <title>World Cup Sweepstake</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      height: 100vh;
      overflow: hidden;
    }

    .wrapper {
      display: flex;
      height: 100vh;
    }

    .left {
      width: 40%;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: all 0.6s ease;
    }

    .left.moved {
      justify-content: flex-start;
      align-items: flex-start;
      padding: 40px;
    }

    .container {
      text-align: center;
      background: rgba(255, 255, 255, 0.05);
      padding: 40px;
      border-radius: 20px;
      width: 320px;
    }

    .left.moved .container {
      width: 100%;
      text-align: left;
      padding: 20px;
    }

    h1 {
      margin-bottom: 20px;
      font-size: 22px;
    }

    button {
      padding: 12px 20px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: #3b82f6;
      color: white;
    }

    button:disabled {
      opacity: 0.5;
    }

    .result {
      margin-top: 20px;
      font-size: 20px;
      min-height: 60px;
    }

    .remaining {
      margin-top: 10px;
      font-size: 14px;
      opacity: 0.8;
    }

    .right {
      width: 60%;
      padding: 40px;
      overflow-y: auto;
    }

    .feed-title {
      font-size: 18px;
      margin-bottom: 15px;
      opacity: 0.8;
    }

    .feed {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .card {
      background: rgba(255,255,255,0.06);
      padding: 15px;
      border-radius: 12px;
      animation: pop 0.3s ease;
    }

    @keyframes pop {
      from { transform: scale(0.95); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .landed {
      animation: popBig 0.4s ease;
    }

    @keyframes popBig {
      0% { transform: scale(1); }
      50% { transform: scale(1.08); }
      100% { transform: scale(1); }
    }

  </style>
</head>

<body>

<div class="wrapper">

  <!-- LEFT -->
  <div class="left" id="leftPanel">

    <div class="container">
      <h1>⚽ Sweepstake Draw</h1>

      <button onclick="startDraw()" id="drawBtn">Start Draw</button>

      <div id="result" class="result"></div>
      <div id="remaining" class="remaining"></div>
    </div>

  </div>

  <!-- RIGHT -->
  <div class="right">
    <div class="feed-title">Live Results</div>
    <div id="feed" class="feed"></div>
  </div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore-compat.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyDgzUhc-cVSoPAejfxV-pHUC2jAZIxTAXw",
    authDomain: "tt-world-cup-sweepstake.firebaseapp.com",
    projectId: "tt-world-cup-sweepstake",
    storageBucket: "tt-world-cup-sweepstake.firebasestorage.app",
    messagingSenderId: "786742826315",
    appId: "1:786742826315:web:9fd75b68ad277f5173c4ce"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
</script>

<script>

let data = null;
let round = 1;
let isAdmin = false;
let running = false;

async function init() {
  const res = await fetch("./teams.json");
  data = await res.json();

  document.getElementById("drawBtn").disabled = true;
  checkAdmin();
}

function checkAdmin() {
  const pass = prompt("Enter admin password:");

  if (pass === "TTWCSweep2026-!\"£") {
    isAdmin = true;
    document.getElementById("drawBtn").disabled = false;
  }
}

function moveUI() {
  document.getElementById("leftPanel").classList.add("moved");
}

function getFlag(team) {
  const flags = {
    "Argentina": "🇦🇷",
    "Brazil": "🇧🇷",
    "France": "🇫🇷",
    "England": "🏴",
    "Spain": "🇪🇸",
    "Portugal": "🇵🇹",
    "Germany": "🇩🇪",
    "Netherlands": "🇳🇱",
    "Italy": "🇮🇹",
    "Belgium": "🇧🇪"
  };

  return flags[team] || "🌍";
}

function getAvailablePeople() {
  return data.people.filter(p => p.teams.length < 2);
}

async function saveToFirebase() {
  if (!isAdmin) return;

  await db.collection("draw").doc("current").set({
    people: data.people,
    teams: data.teams,
    round: round
  });
}

function addToFeed(text) {
  const feed = document.getElementById("feed");

  const card = document.createElement("div");
  card.className = "card";
  card.innerHTML = text;

  feed.prepend(card);
}

function sleep(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

async function startDraw() {

  if (running) return;
  running = true;

  moveUI();

  const resultBox = document.getElementById("result");

  while (true) {

    const peopleLeft = getAvailablePeople();

    if (peopleLeft.length === 0) break;

    const person = peopleLeft[Math.floor(Math.random() * peopleLeft.length)];

    const assignedTeams = data.people.flatMap(p => p.teams);

    const remainingTeams = data.teams.filter(t =>
      !assignedTeams.includes(t.name)
    );

    const team = remainingTeams[Math.floor(Math.random() * remainingTeams.length)];

    // fake spinning
    let elapsed = 0;
    const duration = 1200;
    const intervalTime = 100;

    await new Promise(resolve => {

      const interval = setInterval(() => {

        const tempPerson = peopleLeft[Math.floor(Math.random() * peopleLeft.length)];
        const tempTeam = remainingTeams[Math.floor(Math.random() * remainingTeams.length)];

        resultBox.innerHTML = `🎲 ${tempPerson.name} → ${tempTeam.name}`;

        elapsed += intervalTime;

        if (elapsed > duration) {
          clearInterval(interval);

          person.teams.push(team.name);

          const final = `${getFlag(team.name)} ${person.name} → ${team.name}`;

          resultBox.innerHTML = final;
          addToFeed(final);
          saveToFirebase();

          resolve();
        }

      }, intervalTime);

    });

    // ⏱️ 2 SECOND DELAY BETWEEN RESULTS
    await sleep(2000);
  }

  resultBox.innerHTML = "🎉 Draw Complete!";
  running = false;
}

init();

</script>

</body>
</html>
