<!DOCTYPE html>
<html>
<head>
  <title>World Cup Sweepstake</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      height: 100vh;
      overflow: hidden;
    }

    .wrapper {
      display: flex;
      height: 100vh;
    }

    .left {
      width: 40%;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: all 0.6s ease;
    }

    .left.moved {
      justify-content: flex-start;
      align-items: flex-start;
      padding: 40px;
    }

    .container {
      text-align: center;
      background: rgba(255, 255, 255, 0.05);
      padding: 40px;
      border-radius: 20px;
      width: 320px;
    }

    .left.moved .container {
      width: 100%;
      text-align: left;
      padding: 20px;
    }

    h1 {
      margin-bottom: 20px;
      font-size: 22px;
    }

    button {
      padding: 10px 16px;
      font-size: 14px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: #3b82f6;
      color: white;
      margin: 5px;
    }

    .result {
      margin-top: 20px;
      font-size: 20px;
      min-height: 60px;
    }

    .remaining {
      margin-top: 10px;
      font-size: 14px;
      opacity: 0.8;
    }

    #bigFlag {
      font-size: 90px;
      margin-top: 25px;
      opacity: 0;
      transform: translateY(20px) scale(0.8);
      transition: all 0.6s ease;
      text-align: center;
    }

    #bigFlag.show {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    #progressText {
      margin-top: 12px;
      font-size: 13px;
      opacity: 0.85;
    }

    .progress-wrapper {
      width: 100%;
      height: 10px;
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
      margin-top: 10px;
      overflow: hidden;
    }

    #progressBar {
      height: 100%;
      width: 0%;
      background: #3b82f6;
      transition: width 0.4s ease;
    }

    .right {
      width: 60%;
      padding: 40px;
      overflow-y: auto;
    }

    .feed-title {
      font-size: 18px;
      margin-bottom: 15px;
      opacity: 0.8;
    }

    .feed {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .card {
      background: rgba(255,255,255,0.06);
      padding: 15px;
      border-radius: 12px;
      animation: pop 0.3s ease;
    }

    @keyframes pop {
      from { transform: scale(0.95); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

  </style>
</head>

<body>

<div class="wrapper">

  <!-- LEFT -->
  <div class="left" id="leftPanel">

    <div class="container">
      <h1>⚽ Sweepstake Draw</h1>

      <button onclick="startDraw()" id="drawBtn">Start Draw</button>
      <button onclick="togglePause()" id="pauseBtn" disabled>Pause</button>

      <div id="result" class="result"></div>
      <div id="remaining" class="remaining"></div>

      <div id="bigFlag"></div>

      <div id="progressText"></div>
      <div class="progress-wrapper">
        <div id="progressBar"></div>
      </div>

    </div>

  </div>

  <!-- RIGHT -->
  <div class="right">
    <div class="feed-title">Live Results</div>
    <div id="feed" class="feed"></div>
  </div>

</div>

<!-- SFX -->
<script>
const drum = new Audio("drum.mp3");
const ding = new Audio("ding.mp3");
const cheer = new Audio("cheer.mp3");
const aww = new Audio("aww.mp3");
drum.loop = true;
</script>

<script>

let data = null;
let running = false;
let paused = false;

async function init() {
  const res = await fetch("./teams.json");
  data = await res.json();

  document.getElementById("drawBtn").disabled = true;
  checkAdmin();
}

function checkAdmin() {
  const pass = prompt("Enter admin password:");
  if (pass === "TTWCSweep2026-!\"£") {
    document.getElementById("drawBtn").disabled = false;
  }
}

function moveUI() {
  document.getElementById("leftPanel").classList.add("moved");
}

function togglePause() {
  paused = !paused;
  document.getElementById("pauseBtn").innerText = paused ? "Resume" : "Pause";
}

function waitWhilePaused() {
  return new Promise(res => {
    const i = setInterval(() => {
      if (!paused) { clearInterval(i); res(); }
    }, 200);
  });
}

function getFlag(team) {
  const flags = {
    "France":"🇫🇷","Brazil":"🇧🇷","Germany":"🇩🇪","Spain":"🇪🇸",
    "England":"🏴","Portugal":"🇵🇹","Argentina":"🇦🇷",
    "Netherlands":"🇳🇱","Belgium":"🇧🇪"
  };
  return flags[team] || "🌍";
}

function isBig(team) {
  return ["France","Brazil","Germany","Spain","England","Portugal","Argentina","Netherlands","Belgium"].includes(team);
}

function isBad(team) {
  return ["Haiti","Uzbekistan","Congo","Panama","Curacao","Cape Verde"].includes(team);
}

function getAvailablePeople() {
  return data.people.filter(p => p.teams.length < 2);
}

function addToFeed(text) {
  const feed = document.getElementById("feed");
  const div = document.createElement("div");
  div.className = "card";
  div.innerHTML = text;
  feed.prepend(div);
}

function showFlag(team) {
  const el = document.getElementById("bigFlag");
  el.innerHTML = getFlag(team);
  el.classList.remove("show");
  void el.offsetWidth;
  el.classList.add("show");
}

function updateProgress() {
  const total = data.people.length * 2;
  const assigned = data.people.reduce((s,p)=>s+p.teams.length,0);
  const pct = (assigned/total)*100;

  document.getElementById("progressText").innerText =
    `${assigned} / ${total} teams assigned`;

  document.getElementById("progressBar").style.width = pct + "%";
}

async function startDraw() {

  if (running) return;
  running = true;

  paused = false;
  document.getElementById("pauseBtn").disabled = false;

  moveUI();

  const result = document.getElementById("result");

  drum.play();

  while (true) {

    await waitWhilePaused();

    const peopleLeft = getAvailablePeople();
    if (!peopleLeft.length) break;

    const person = peopleLeft[Math.floor(Math.random()*peopleLeft.length)];

    const assigned = data.people.flatMap(p=>p.teams);

    const remaining = data.teams.filter(t=>!assigned.includes(t.name));

    const team = remaining[Math.floor(Math.random()*remaining.length)];

    let t=0;
    const duration=1200;

    await new Promise(res=>{

      const i=setInterval(()=>{

        const p=peopleLeft[Math.floor(Math.random()*peopleLeft.length)];
        const tm=remaining[Math.floor(Math.random()*remaining.length)];

        result.innerHTML=`🎲 ${p.name} → ${tm.name}`;

        t+=100;

        if(t>duration){
          clearInterval(i);

          person.teams.push(team.name);

          const final=`${getFlag(team.name)} ${person.name} → ${team.name}`;

          result.innerHTML=final;

          addToFeed(final);
          showFlag(team.name);
          updateProgress();

          drum.pause(); drum.currentTime=0;

          if(isBig(team.name)) cheer.play();
          else if(isBad(team.name)) aww.play();
          else ding.play();

          drum.play();

          res();
        }

      },100);

    });

    await waitWhilePaused();
    await new Promise(r=>setTimeout(r,2000));
  }

  drum.pause();
  result.innerHTML="🎉 Complete!";
  running=false;
}

init();

</script>

</body>
</html>
