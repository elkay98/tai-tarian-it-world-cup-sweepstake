<script>
let data = null;

async function init() {
  const res = await fetch("./teams.json");
  data = await res.json();
}

function getAvailablePeople() {
  return data.people.filter(p => p.teams.length < 2);
}

function drawTeam() {

  const availablePeople = getAvailablePeople();

  if (availablePeople.length === 0) {
    document.getElementById("result").innerHTML = "✅ Draw complete!";
    return;
  }

  // pick random person who still needs teams
  const personIndex = Math.floor(Math.random() * availablePeople.length);
  const person = availablePeople[personIndex];

  // FIXED: derive remaining teams ONLY from data.teams + people assignments
  const remainingTeams = data.teams.filter(t =>
    !data.people.some(p => p.teams.includes(t.name))
  );

  if (remainingTeams.length === 0) {
    document.getElementById("result").innerHTML = "⚠️ No teams left!";
    return;
  }

  // pick random team
  const teamIndex = Math.floor(Math.random() * remainingTeams.length);
  const team = remainingTeams[teamIndex];

  // assign team
  person.teams.push(team.name);

  // UI update
  document.getElementById("result").innerHTML =
    `${person.name} gets <br><br> 🌍 ${team.name}`;

  document.getElementById("remaining").innerHTML =
    `${getAvailablePeople().length} people still need teams`;

}

init();
</script>
