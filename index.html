<!DOCTYPE html>
<html>
<head>
  <title>T&I World Cup 2026 Sweepstake</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      overflow: hidden;
    }

    .wrapper { display:flex; height:100vh; }

    .left {
      width:40%;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .container {
      text-align:center;
      background:rgba(255,255,255,0.05);
      padding:40px;
      border-radius:20px;
      width:320px;
    }

    button {
      padding:10px 14px;
      margin:5px;
      border:none;
      border-radius:10px;
      background:#3b82f6;
      color:white;
      cursor:pointer;
    }

    #roundLabel {
      margin:10px 0;
      opacity:0.8;
    }

    #progressWrapper {
      margin-top:12px;
      height:10px;
      width:100%;
      background:rgba(255,255,255,0.1);
      border-radius:10px;
      overflow:hidden;
    }

    #progressBar {
      height:10px;
      width:0%;
      background:#22c55e;
      transition:width 0.3s;
    }

    .right {
      width:60%;
      padding:40px;
      overflow-y:auto;
    }

    .card {
      background:rgba(255,255,255,0.06);
      padding:10px;
      margin-bottom:8px;
      border-radius:10px;
    }

    .flag {
      width:28px;
      height:20px;
      border-radius:3px;
      vertical-align:middle;
      margin:0 6px;
    }
  </style>
</head>

<body>

<div class="wrapper">

  <div class="left">
    <div class="container">

      <h2>⚽ T&I World Cup 2026 Sweepstake</h2>

      <div id="roundLabel">Ready</div>

      <button onclick="startDraw()">Start Draw</button>
      <button onclick="pauseDraw()">Pause</button>
      <button onclick="randomiseDraw()">Randomise</button>
      <button onclick="resetDraw()">Reset</button>

      <div id="progressWrapper">
        <div id="progressBar"></div>
      </div>

      <div id="result"></div>

    </div>
  </div>

  <div class="right">
    <div id="feed"></div>
  </div>

</div>

<script>

let data;

let people = [];
let teams = [];

let results = {};
let i = 0;
let round = 1;
let paused = false;

const TOTAL = 48;

/* ---------------- FLAGS (RESTORED SAFE VERSION) ---------------- */
const flags = {
  "Argentina":"ar","Brazil":"br","England":"gb-eng","France":"fr",
  "Germany":"de","Spain":"es","Portugal":"pt","Netherlands":"nl",
  "USA":"us","Mexico":"mx","Canada":"ca","Belgium":"be",
  "Croatia":"hr","Switzerland":"ch","Denmark":"dk","Austria":"at",
  "Serbia":"rs","Ukraine":"ua","Turkey":"tr","Poland":"pl",
  "Morocco":"ma","Senegal":"sn","Nigeria":"ng","Egypt":"eg",
  "Ghana":"gh","Cameroon":"cm","Algeria":"dz","Ivory Coast":"ci",
  "Japan":"jp","South Korea":"kr","Iran":"ir","Saudi Arabia":"sa",
  "Qatar":"qa","Australia":"au","Uzbekistan":"uz","Iraq":"iq",
  "Panama":"pa","Haiti":"ht","Curaçao":"cw","Cape Verde":"cv",
  "DR Congo":"cd","Tunisia":"tn"
};

function getFlagImg(team){
  const code = flags[team];
  if(!code) return "";
  return `<img class="flag" src="https://flagcdn.com/w40/${code}.png">`;
}

/* ---------------- SAVE ---------------- */
function save(){
  localStorage.setItem("sweepstakeResults", JSON.stringify(results));
}

/* ---------------- START DRAW ---------------- */
function startDraw(){

  people = [...data.people].sort(()=>Math.random()-0.5);
  teams = [...data.teams.map(t=>t.name)];

  results = {};
  i = 0;
  round = 1;
  paused = false;

  runStep();
}

/* ---------------- STEP ENGINE ---------------- */
function runStep(){

  if(paused) return;

  if(i >= people.length){

    if(round === 1){
      round = 2;
      i = 0;
      document.getElementById("roundLabel").innerText = "ROUND 1 COMPLETE";
      setTimeout(runStep, 1200);
      return;
    }

    finish();
    return;
  }

  let person = people[i];
  let team = teams.splice(Math.random()*teams.length|0,1)[0];

  if(!results[person.name]){
    results[person.name] = {team1:"",team2:""};
  }

  if(round === 1){
    results[person.name].team1 = team;
  } else {
    results[person.name].team2 = team;
  }

  document.getElementById("roundLabel").innerText = "Round " + round;

  const div = document.createElement("div");
  div.className = "card";

  // ✅ FIXED FLAG RENDERING (SAFE + RELIABLE)
  div.innerHTML =
    person.name +
    " → " +
    getFlagImg(team) +
    " " +
    team;

  document.getElementById("feed").prepend(div);

  i++;

  document.getElementById("progressBar").style.width =
    (Object.keys(results).length*2 / TOTAL * 100) + "%";

  setTimeout(runStep, 800);
}

/* ---------------- PAUSE ---------------- */
function pauseDraw(){
  paused = !paused;
  if(!paused) runStep();
}

/* ---------------- RANDOMISE (FIXED + CONSOLIDATED) ---------------- */
function randomiseDraw(){

  let p = [...data.people].sort(()=>Math.random()-0.5);
  let t = [...data.teams.map(x=>x.name)];

  results = {};

  p.forEach(person=>{
    results[person.name] = {
      team1: t.splice(Math.random()*t.length|0,1)[0],
      team2: t.splice(Math.random()*t.length|0,1)[0]
    };
  });

  document.getElementById("progressBar").style.width = "100%";
  document.getElementById("roundLabel").innerText = "DRAW COMPLETE";

  save();

  document.getElementById("result").innerHTML = `
    🎉 DRAW COMPLETE<br>
    <button onclick="go()">Go to Tracker</button>
  `;
}

/* ---------------- FINISH ---------------- */
function finish(){

  document.getElementById("progressBar").style.width = "100%";
  document.getElementById("roundLabel").innerText = "DRAW COMPLETE";

  save();

  document.getElementById("result").innerHTML = `
    🎉 DRAW COMPLETE<br>
    <button onclick="go()">Go to Tracker</button>
  `;
}

function go(){
  window.location.href = "tracker.html";
}

/* ---------------- RESET ---------------- */
function reset(){
  location.reload();
}

/* ---------------- LOAD ---------------- */
fetch("teams.json").then(r=>r.json()).then(j=>data=j);

</script>

</body>
</html>
