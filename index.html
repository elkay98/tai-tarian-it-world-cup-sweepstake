<!DOCTYPE html>
<html>
<head>
  <title>World Cup Sweepstake</title>
  <style>
    body { font-family: Arial; background:#111; color:white; margin:0; }
    .wrap { display:flex; height:100vh; }
    .left { width:40%; padding:40px; }
    .right { width:60%; padding:40px; overflow:auto; }
    .card { background:#222; padding:10px; margin:5px 0; border-radius:8px; }
    button { padding:10px; margin:5px; cursor:pointer; }
  </style>
</head>
<body>

<div class="wrap">
  <div class="left">
    <h1>World Cup Sweepstake</h1>
    <button onclick="startDraw()">Start Draw</button>
    <div id="current"></div>
  </div>

  <div class="right">
    <div id="feed"></div>
  </div>
</div>

<script>
let data;
let running = false;

/* 🔊 SIMPLE AUDIO */
function play(freq){
  const ctx = new (window.AudioContext||window.webkitAudioContext)();
  const o = ctx.createOscillator();
  const g = ctx.createGain();
  o.connect(g); g.connect(ctx.destination);
  o.frequency.value = freq;
  g.gain.value = 0.1;
  o.start();
  setTimeout(()=>o.stop(),200);
}

/* 🧠 TIER CHECK (ONLY SOURCE OF TRUTH) */
function getTier(team){
  const t = data.teams.find(x=>x.name===team);
  return t ? t.tier : "mid";
}

/* ⚽ DRAW */
function startDraw(){
  if(running) return;
  running = true;

  let people = [...data.people];
  let teams = [...data.teams.map(t=>t.name)];

  let i = 0;

  function step(){
    if(i>=people.length) return;

    const person = people[i];
    const team = teams.splice(Math.floor(Math.random()*teams.length),1)[0];

    const tier = getTier(team);

    person.team = team;

    document.getElementById("current").innerText =
      person.name + " → " + team;

    const div = document.createElement("div");
    div.className="card";
    div.innerText = person.name + " → " + team;
    document.getElementById("feed").prepend(div);

    /* 🔊 SOUND FIX (NOW USES TIER ONLY) */
    if(tier==="elite") play(900);
    else if(tier==="low") play(300);
    else play(600);

    i++;
    setTimeout(step, 1200);
  }

  step();
}

/* 📦 LOAD JSON */
fetch("teams.json")
  .then(r=>r.json())
  .then(j=>{
    data=j;
  });
</script>

</body>
</html>
