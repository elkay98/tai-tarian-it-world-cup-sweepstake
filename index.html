<!DOCTYPE html>
<html>
<head>
  <title>World Cup Sweepstake</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
      background: rgba(255, 255, 255, 0.05);
      padding: 40px;
      border-radius: 20px;
      width: 420px;
    }

    h1 {
      margin-bottom: 20px;
      font-size: 24px;
    }

    button {
      padding: 12px 20px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: #3b82f6;
      color: white;
    }

    button:hover {
      background: #2563eb;
    }

    .result {
      margin-top: 25px;
      font-size: 22px;
      font-weight: bold;
      min-height: 60px;
    }

    .remaining {
      margin-top: 10px;
      font-size: 14px;
      opacity: 0.8;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>⚽ World Cup Sweepstake</h1>

  <button onclick="drawTeam()">Draw</button>

  <div id="result" class="result"></div>
  <div id="remaining" class="remaining"></div>
</div>

<script>
let data = null;

async function init() {
  const res = await fetch("./teams.json");
  data = await res.json();
}

function getFlag(team) {
  const flags = {
    "Argentina": "🇦🇷",
    "Brazil": "🇧🇷",
    "France": "🇫🇷",
    "England": "🏴",
    "Spain": "🇪🇸",
    "Portugal": "🇵🇹",
    "Germany": "🇩🇪",
    "Netherlands": "🇳🇱",
    "Italy": "🇮🇹",
    "Belgium": "🇧🇪",
    "Croatia": "🇭🇷",
    "Uruguay": "🇺🇾",
    "USA": "🇺🇸",
    "Mexico": "🇲🇽",
    "Canada": "🇨🇦",
    "Japan": "🇯🇵",
    "South Korea": "🇰🇷",
    "Morocco": "🇲🇦",
    "Senegal": "🇸🇳",
    "Switzerland": "🇨🇭",
    "Denmark": "🇩🇰",
    "Austria": "🇦🇹",
    "Poland": "🇵🇱",
    "Wales": "🏴",
    "Scotland": "🏴",
    "Serbia": "🇷🇸",
    "Ukraine": "🇺🇦",
    "Turkey": "🇹🇷",
    "Nigeria": "🇳🇬",
    "Egypt": "🇪🇬",
    "Ghana": "🇬🇭",
    "Cameroon": "🇨🇲",
    "Algeria": "🇩🇿",
    "Tunisia": "🇹🇳",
    "Ecuador": "🇪🇨",
    "Colombia": "🇨🇴",
    "Chile": "🇨🇱",
    "Peru": "🇵🇪",
    "Paraguay": "🇵🇾",
    "Iran": "🇮🇷",
    "Saudi Arabia": "🇸🇦",
    "Qatar": "🇶🇦",
    "Australia": "🇦🇺",
    "New Zealand": "🇳🇿",
    "Costa Rica": "🇨🇷",
    "Panama": "🇵🇦",
    "Honduras": "🇭🇳",
    "Ivory Coast": "🇨🇮"
  };

  return flags[team] || "🌍";
}

function getAvailablePeople() {
  return data.people.filter(p => p.teams.length < 2);
}

function drawTeam() {
  if (!data) return;

  const peopleLeft = getAvailablePeople();

  if (peopleLeft.length === 0) {
    document.getElementById("result").innerHTML = "🎉 Draw complete!";
    return;
  }

  const person = peopleLeft[Math.floor(Math.random() * peopleLeft.length)];

  const assignedTeams = data.people.flatMap(p => p.teams);

  const remainingTeams = data.teams.filter(t =>
    !assignedTeams.includes(t.name)
  );

  const team = remainingTeams[Math.floor(Math.random() * remainingTeams.length)];

  person.teams.push(team.name);

  document.getElementById("result").innerHTML =
    `${getFlag(team.name)} ${person.name} → ${team.name}`;

  document.getElementById("remaining").innerHTML =
    `${getAvailablePeople().length} people still need teams`;
}

init();
</script>

</body>
</html>
