<!DOCTYPE html>
<html>
<head>
  <title>World Cup Sweepstake</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      overflow: hidden;
    }

    .wrapper {
      display: flex;
      height: 100vh;
    }

    .left {
      width: 40%;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: all 0.6s ease;
    }

    .container {
      text-align: center;
      background: rgba(255,255,255,0.05);
      padding: 40px;
      border-radius: 20px;
      width: 320px;
    }

    h1 { margin-bottom: 20px; }

    button {
      padding: 10px 16px;
      margin: 5px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: #3b82f6;
      color: white;
    }

    .result {
      margin-top: 20px;
      font-size: 20px;
      min-height: 60px;
    }

    #bigFlag {
      font-size: 80px;
      margin-top: 20px;
      opacity: 0;
      transform: translateY(20px) scale(0.8);
      transition: all 0.6s ease;
    }

    #bigFlag.show {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .right {
      width: 60%;
      padding: 40px;
      overflow-y: auto;
    }

    .card {
      background: rgba(255,255,255,0.06);
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 10px;
    }

    #adminPanel {
      display: none;
    }
  </style>
</head>

<body>

<div class="wrapper">

  <div class="left">
    <div class="container">

      <h1>⚽ Sweepstake Draw</h1>

      <input type="password" id="adminPass" placeholder="Admin password">
      <button onclick="unlockAdmin()">Unlock</button>

      <div id="adminPanel">
        <button onclick="startDraw()">Start Draw</button>
        <button onclick="togglePause()" id="pauseBtn">Pause</button>
      </div>

      <div id="result" class="result"></div>
      <div id="bigFlag"></div>

    </div>
  </div>

  <div class="right">
    <div id="feed"></div>
  </div>

</div>

<script>
let data;
let running = false;
let paused = false;
let ctx;

/* 🔐 ADMIN */
const ADMIN_PASSWORD = 'TTWCSweep2026-!"£';

function unlockAdmin(){
  const input = document.getElementById("adminPass").value;
  if(input === ADMIN_PASSWORD){
    document.getElementById("adminPanel").style.display = "block";
    alert("Admin unlocked");
  } else {
    alert("Wrong password");
  }
}

/* ⏸ PAUSE */
function togglePause(){
  paused = !paused;
  document.getElementById("pauseBtn").innerText =
    paused ? "Resume" : "Pause";
}

/* 🔊 AUDIO */
function initAudio(){
  ctx = new (window.AudioContext || window.webkitAudioContext)();
}

function play(freq){
  const o = ctx.createOscillator();
  const g = ctx.createGain();

  o.connect(g);
  g.connect(ctx.destination);

  o.frequency.value = freq;
  g.gain.value = 0.12;

  o.start();
  setTimeout(()=>o.stop(), 250);
}

/* sounds */
function playDing(){ play(700); }
function playCheer(){
  play(900);
  setTimeout(()=>play(1200), 120);
}
function playAww(){
  play(300);
  setTimeout(()=>play(200), 120);
}

/* 🎺 DRUMROLL */
function drumroll(){
  play(120);
  setTimeout(()=>play(140), 150);
  setTimeout(()=>play(120), 300);
}

/* 🧠 TIER */
function getTier(teamName){
  const t = data.teams.find(x => x.name === teamName);
  return t ? t.tier : "mid";
}

/* ⚽ DRAW */
function startDraw(){
  if(running) return;
  running = true;

  if(!ctx) initAudio();

  let people = [...data.people];
  let teams = data.teams.map(t => t.name);

  let i = 0;

  function step(){
    if(i >= people.length) return;

    if(paused){
      setTimeout(step, 500);
      return;
    }

    const person = people[i];

    const team = teams.splice(
      Math.floor(Math.random() * teams.length),
      1
    )[0];

    const tier = getTier(team);

    /* 🎺 DRUMROLL BEFORE REVEAL */
    drumroll();

    document.getElementById("result").innerText =
      "Drawing...";

    setTimeout(() => {

      /* 🎬 REVEAL */
      person.team = team;

      document.getElementById("result").innerText =
        person.name + " → " + team;

      const flag = document.getElementById("bigFlag");
      flag.innerText = "🏳️";
      flag.classList.add("show");

      setTimeout(() => flag.classList.remove("show"), 1200);

      const div = document.createElement("div");
      div.className = "card";
      div.innerText = person.name + " → " + team;
      document.getElementById("feed").prepend(div);

      /* 🔊 SOUND AFTER REVEAL */
      if(tier === "elite") playCheer();
      else if(tier === "low") playAww();
      else playDing();

    }, tier === "elite" ? 2500 : 1500);

    i++;

    /* ⏱ delay between picks */
    setTimeout(step, tier === "elite" ? 3500 : 2500);
  }

  step();
}

/* 📦 LOAD DATA */
fetch("teams.json")
  .then(r => r.json())
  .then(j => data = j);

</script>

</body>
</html>
