<!DOCTYPE html>
<html>
<head>
  <title>T&I World Cup 2026 Sweepstake</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      overflow: hidden;
    }

    .wrapper { display:flex; height:100vh; }

    .left {
      width:40%;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .container {
      text-align:center;
      background:rgba(255,255,255,0.05);
      padding:40px;
      border-radius:20px;
      width:320px;
    }

    button {
      padding:10px 14px;
      margin:5px;
      border:none;
      border-radius:10px;
      background:#3b82f6;
      color:white;
      cursor:pointer;
    }

    #roundLabel {
      margin:10px 0;
      opacity:0.85;
      font-weight:bold;
    }

    #progressText {
      margin-top:8px;
      font-size:14px;
      opacity:0.95;
      line-height:1.4;
    }

    #progressWrapper {
      margin-top:12px;
      height:10px;
      width:100%;
      background:rgba(255,255,255,0.1);
      border-radius:10px;
      overflow:hidden;
    }

    #progressBar {
      height:10px;
      width:0%;
      background:#22c55e;
      transition:width 0.3s;
    }

    .right {
      width:60%;
      padding:40px;
      overflow-y:auto;
    }

    .card {
      background:rgba(255,255,255,0.06);
      padding:10px;
      margin-bottom:8px;
      border-radius:10px;
    }

    .flag {
      width:28px;
      height:20px;
      border-radius:3px;
      vertical-align:middle;
      margin:0 6px;
    }

    #overlay {
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.85);
      display:none;
      align-items:center;
      justify-content:center;
      font-size:48px;
      font-weight:bold;
      z-index:9999;
    }

    /* GRID VIEW */
    #gridView {
      display:none;
      flex-wrap:wrap;
      gap:12px;
    }

    .gridCard {
      width:220px;
      background:rgba(255,255,255,0.06);
      padding:12px;
      border-radius:12px;
    }

    .teamRow {
      display:flex;
      align-items:center;
      gap:6px;
      margin:6px 0;
    }
  </style>
</head>

<body>

<div id="overlay">ROUND 1 COMPLETE</div>

<div class="wrapper">

  <div class="left">
    <div class="container">

      <h2>⚽ T&I World Cup 2026 Sweepstake</h2>

      <div id="roundLabel">Ready</div>

      <button onclick="startDraw()">Start Draw</button>
      <button onclick="togglePause()">Pause / Resume</button>
      <button onclick="randomiseDraw()">Randomise</button>
      <button onclick="reset()">Reset</button>
      <button onclick="toggleView()">Switch View</button>

      <div id="progressText"></div>

      <div id="progressWrapper">
        <div id="progressBar"></div>
      </div>

      <div id="result"></div>

    </div>
  </div>

  <div class="right">
    <div id="feed"></div>
    <div id="gridView"></div>
  </div>

</div>

<script>

let data;
let people = [];
let teams = [];

let results = {};
let i = 0;
let round = 1;
let paused = false;
let running = false;

let viewMode = "feed";

const DRAW_SPEED = 2500;

/* ---------------- GRID VIEW ---------------- */

function toggleView(){

  const feed = document.getElementById("feed");
  const grid = document.getElementById("gridView");

  if(viewMode === "feed"){
    viewMode = "grid";
    feed.style.display = "none";
    grid.style.display = "flex";
    renderGrid();
  } else {
    viewMode = "feed";
    feed.style.display = "block";
    grid.style.display = "none";
  }
}

function renderGrid(){

  const grid = document.getElementById("gridView");
  grid.innerHTML = "";

  Object.keys(results).sort().forEach(name => {

    const t1 = results[name].team1 || "N/A";
    const t2 = results[name].team2 || "N/A";

    const card = document.createElement("div");
    card.className = "gridCard";

    card.innerHTML = `
      <h3 style="margin:0 0 10px 0;">${name}</h3>

      <div class="teamRow">
        ${getFlagImg(t1)} <span>${t1}</span>
      </div>

      <div class="teamRow">
        ${getFlagImg(t2)} <span>${t2}</span>
      </div>
    `;

    grid.appendChild(card);
  });
}

/* ---------------- AUDIO ---------------- */

let ctx;

function initAudio(){
  if(!ctx){
    ctx = new (window.AudioContext || window.webkitAudioContext)();
  }
}

function play(freq, duration = 200){

  if(!ctx) return;

  const osc = ctx.createOscillator();
  const gain = ctx.createGain();

  osc.connect(gain);
  gain.connect(ctx.destination);

  osc.frequency.value = freq;
  gain.gain.value = 0.08;

  osc.start();
  setTimeout(()=>osc.stop(), duration);
}

function playDing(){ play(700); }
function playCheer(){ play(950); setTimeout(()=>play(1200),120); }
function playAww(){ play(280); setTimeout(()=>play(180),120); }

/* ---------------- FLAGS ---------------- */

const flags = {
  "Argentina":"ar","Brazil":"br","England":"gb-eng","France":"fr",
  "Germany":"de","Spain":"es","Portugal":"pt","Netherlands":"nl",
  "USA":"us","Mexico":"mx","Canada":"ca","Belgium":"be",
  "Croatia":"hr","Switzerland":"ch","Denmark":"dk","Austria":"at",
  "Serbia":"rs","Ukraine":"ua","Turkey":"tr","Poland":"pl",
  "Morocco":"ma","Senegal":"sn","Nigeria":"ng","Egypt":"eg",
  "Ghana":"gh","Cameroon":"cm","Algeria":"dz","Ivory Coast":"ci",
  "Japan":"jp","South Korea":"kr","Iran":"ir","Saudi Arabia":"sa",
  "Qatar":"qa","Australia":"au","Uzbekistan":"uz","Iraq":"iq",
  "Panama":"pa","Haiti":"ht","Curaçao":"cw","Cape Verde":"cv",
  "DR Congo":"cd","Tunisia":"tn"
};

function getFlagImg(team){
  const code = flags[team];
  return code ? `<img class="flag" src="https://flagcdn.com/w40/${code}.png">` : "";
}

/* ---------------- START ---------------- */

function startDraw(){

  initAudio();

  people = [...data.people].sort(()=>Math.random()-0.5);

  const allTeams = [...data.teams.map(t=>t.name)];

  const round1Teams = allTeams.slice(0, 26);
  const round2Teams = allTeams.slice(26, 48);

  results = {};
  i = 0;
  round = 1;
  paused = false;
  running = true;

  document.getElementById("feed").innerHTML = "";
  document.getElementById("gridView").innerHTML = "";

  updateProgress(0);

  const round2People = [...people]
    .sort(() => Math.random() - 0.5)
    .slice(0, 22);

  runLoop(people, round1Teams, round2Teams, round2People);
}

/* ---------------- LOOP ---------------- */

function runLoop(allPeople, round1Teams, round2Teams, round2People){

  if(!running) return;

  if(paused){
    setTimeout(()=>runLoop(allPeople, round1Teams, round2Teams, round2People), 300);
    return;
  }

  let teams = round === 1 ? round1Teams : round2Teams;
  let currentPeople = round === 1 ? allPeople : round2People;

  if(i >= currentPeople.length){

    if(round === 1){
      round = 2;
      i = 0;

      document.getElementById("overlay").style.display = "flex";

      setTimeout(()=>{
        document.getElementById("overlay").style.display = "none";
        runLoop(allPeople, round1Teams, round2Teams, round2People);
      }, 3000);

      return;
    }

    finish();
    return;
  }

  let person = currentPeople[i];
  let team = teams.splice(Math.floor(Math.random() * teams.length),1)[0];

  if(!results[person.name]){
    results[person.name] = {team1:"",team2:""};
  }

  /* TEAM ASSIGN */
  if(round === 1){
    results[person.name].team1 = team;
  } else {
    results[person.name].team2 = team;
  }

  /* 🔊 SOUND RESTORED */
  if(eliteTeams.includes(team)){
    playCheer();
  }
  else if(lowTeams.includes(team)){
    playAww();
  }
  else{
    playDing();
  }

  /* FEED WITH LABELS RESTORED */
  const div = document.createElement("div");
  div.className = "card";

  div.innerHTML =
    (round === 1 ? "Team 1: " : "Team 2: ") +
    `${person.name} → ${getFlagImg(team)} ${team}`;

  document.getElementById("feed").prepend(div);

  i++;
  updateProgress(i);

  setTimeout(()=>runLoop(allPeople, round1Teams, round2Teams, round2People), DRAW_SPEED);
}

/* ---------------- PROGRESS ---------------- */

function updateProgress(done){

  const total = 48;

  const displayStart = round === 1 ? 0 : 26;
  const displayDone = displayStart + done;

  const percent = Math.round((displayDone / total) * 100);

  document.getElementById("progressText").innerHTML =
    `${displayDone}/48`;

  document.getElementById("progressBar").style.width = percent + "%";
}

/* ---------------- OTHER ---------------- */

function togglePause(){ paused = !paused; }

function finish(){
  running = false;
  localStorage.setItem("sweepstakeResults", JSON.stringify(results));
  document.getElementById("roundLabel").innerText = "DRAW COMPLETE";
}

function randomiseDraw(){
  let p = [...data.people].sort(()=>Math.random()-0.5);
  let t = [...data.teams.map(x=>x.name)];

  results = {};

  p.forEach(person=>{
    const team1 = t.splice(Math.floor(Math.random()*t.length),1)[0];
    const team2 = t.splice(Math.floor(Math.random()*t.length),1)[0];
    results[person.name] = { team1, team2 };
  });

  localStorage.setItem("sweepstakeResults", JSON.stringify(results));
  document.getElementById("roundLabel").innerText = "DRAW COMPLETE";
  renderGrid();
}

function reset(){
  localStorage.removeItem("sweepstakeResults");
  location.reload();
}

function go(){
  window.location.href = "tracker.html";
}

/* ---------------- LOAD ---------------- */

fetch("teams.json")
  .then(r=>r.json())
  .then(j=>data=j);

</script>

</body>
</html>
