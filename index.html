<!DOCTYPE html>
<html>
<head>
  <title>World Cup Sweepstake</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      overflow: hidden;
    }

    .wrapper {
      display: flex;
      height: 100vh;
    }

    .left {
      width: 40%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      text-align: center;
      background: rgba(255,255,255,0.05);
      padding: 40px;
      border-radius: 20px;
      width: 320px;
    }

    button {
      padding: 10px 16px;
      margin: 5px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: #3b82f6;
      color: white;
    }

    .result {
      margin-top: 20px;
      font-size: 20px;
      min-height: 60px;
    }

    #bigFlag {
      font-size: 80px;
      margin-top: 20px;
      opacity: 0;
      transform: translateY(20px) scale(0.8);
      transition: all 0.6s ease;
    }

    #bigFlag.show {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .right {
      width: 60%;
      padding: 40px;
      overflow-y: auto;
    }

    .card {
      background: rgba(255,255,255,0.06);
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 10px;
    }

    #adminPanel {
      display: none;
      margin-top: 10px;
    }

    /* 📊 PROGRESS BAR */
    #progressWrapper {
      margin-top: 10px;
      width: 100%;
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
      height: 10px;
      overflow: hidden;
    }

    #progressBar {
      height: 10px;
      width: 0%;
      background: #22c55e;
      transition: width 0.4s ease;
    }

    #progressText {
      font-size: 12px;
      margin-top: 6px;
      opacity: 0.8;
    }
  </style>
</head>

<body>

<div class="wrapper">

  <div class="left">
    <div class="container">

      <h1>⚽ Sweepstake Draw</h1>

      <!-- 🔐 LOGIN -->
      <div id="loginBox">
        <input type="password" id="adminPass" placeholder="Admin password">
        <button onclick="unlockAdmin()">Unlock</button>
      </div>

      <div id="adminPanel">
        <button onclick="startDraw()">Start Draw</button>
        <button onclick="togglePause()" id="pauseBtn">Pause</button>
        <button onclick="resetDraw()">Reset</button>
      </div>

      <!-- 📊 PROGRESS -->
      <div id="progressWrapper">
        <div id="progressBar"></div>
      </div>
      <div id="progressText">0% complete</div>

      <div id="result" class="result"></div>
      <div id="bigFlag"></div>

    </div>
  </div>

  <div class="right">
    <div id="feed"></div>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import {
  getFirestore,
  doc,
  setDoc
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDgzUhc-cVSoPAejfxV-pHUC2jAZIxTAXw",
  authDomain: "tt-world-cup-sweepstake.firebaseapp.com",
  projectId: "tt-world-cup-sweepstake",
  storageBucket: "tt-world-cup-sweepstake.firebasestorage.app",
  messagingSenderId: "786742826315",
  appId: "1:786742826315:web:9fd75b68ad277f5173c4ce"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.db = db;
window.firebaseSet = setDoc;
window.firebaseDoc = doc;
</script>

<script>
let data;
let running = false;
let paused = false;
let ctx;
let totalPeople = 0;
let completed = 0;

const ADMIN_PASSWORD = 'TTWCSweep2026-!"£';

/* 🔐 ADMIN */
function unlockAdmin(){
  const input = document.getElementById("adminPass").value;
  if(input === ADMIN_PASSWORD){
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("adminPanel").style.display = "block";
  } else {
    alert("Wrong password");
  }
}

/* ⏸ PAUSE */
function togglePause(){
  paused = !paused;
  document.getElementById("pauseBtn").innerText =
    paused ? "Resume" : "Pause";
}

/* 📊 PROGRESS UPDATE */
function updateProgress(){
  const percent = Math.round((completed / totalPeople) * 100);

  document.getElementById("progressBar").style.width = percent + "%";
  document.getElementById("progressText").innerText =
    percent + "% complete (" + completed + "/" + totalPeople + ")";
}

/* 🔊 AUDIO */
function initAudio(){
  ctx = new (window.AudioContext || window.webkitAudioContext)();
}

function play(freq){
  const o = ctx.createOscillator();
  const g = ctx.createGain();

  o.connect(g);
  g.connect(ctx.destination);

  o.frequency.value = freq;
  g.gain.value = 0.12;

  o.start();
  setTimeout(()=>o.stop(), 250);
}

function playDing(){ play(700); }
function playCheer(){ play(900); setTimeout(()=>play(1200),120); }
function playAww(){ play(300); setTimeout(()=>play(200),120); }

function drumroll(){
  play(120);
  setTimeout(()=>play(140),150);
  setTimeout(()=>play(120),300);
}

/* 🏳️ FLAGS */
const flags = {
  "Argentina":"🇦🇷","Brazil":"🇧🇷","England":"🏴","France":"🇫🇷",
  "Germany":"🇩🇪","Spain":"🇪🇸","Portugal":"🇵🇹","Netherlands":"🇳🇱",
  "USA":"🇺🇸","Mexico":"🇲🇽","Canada":"🇨🇦",
  "Belgium":"🇧🇪","Croatia":"🇭🇷","Switzerland":"🇨🇭","Denmark":"🇩🇰",
  "Austria":"🇦🇹","Serbia":"🇷🇸","Ukraine":"🇺🇦","Turkey":"🇹🇷",
  "Poland":"🇵🇱","Morocco":"🇲🇦","Senegal":"🇸🇳","Nigeria":"🇳🇬",
  "Egypt":"🇪🇬","Ghana":"🇬🇭","Cameroon":"🇨🇲","Algeria":"🇩🇿",
  "Ivory Coast":"🇨🇮","Japan":"🇯🇵","South Korea":"🇰🇷",
  "Iran":"🇮🇷","Saudi Arabia":"🇸🇦","Qatar":"🇶🇦",
  "Australia":"🇦🇺","Uzbekistan":"🇺🇿","Iraq":"🇮🇶",
  "Panama":"🇵🇦","Haiti":"🇭🇹","Curaçao":"🇨🇼","Cape Verde":"🇨🇻",
  "DR Congo":"🇨🇩","Tunisia":"🇹🇳"
};

/* ⚽ DRAW */
function startDraw(){
  if(running) return;
  running = true;

  if(!ctx) initAudio();

  let people = [...data.people];
  let teams = data.teams.map(t => t.name);

  totalPeople = people.length;
  completed = 0;
  updateProgress();

  let i = 0;

  function step(){
    if(i >= people.length) return;

    if(paused){
      setTimeout(step, 500);
      return;
    }

    const person = people[i];

    const team = teams.splice(
      Math.floor(Math.random() * teams.length),
      1
    )[0];

    drumroll();

    document.getElementById("result").innerText = "Drawing...";

    setTimeout(() => {

      const flag = flags[team] || "🏳️";

      document.getElementById("result").innerText =
        person.name + " → " + flag + " " + team;

      const div = document.createElement("div");
      div.className = "card";
      div.innerText = person.name + " → " + flag + " " + team;

      document.getElementById("feed").prepend(div);

      completed++;
      updateProgress();

      playDing();

    }, 1500);

    i++;
    setTimeout(step, 2200);
  }

  step();
}

/* 🧨 RESET */
async function resetDraw(){
  if(!confirm("Reset everything?")) return;

  document.getElementById("feed").innerHTML = "";
  document.getElementById("result").innerText = "";

  completed = 0;
  updateProgress();

  alert("Reset complete");
}

/* 📦 LOAD */
fetch("teams.json")
  .then(r => r.json())
  .then(j => data = j);
</script>

</body>
</html>
