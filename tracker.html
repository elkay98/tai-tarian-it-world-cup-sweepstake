<!DOCTYPE html>
<html>
<head>
  <title>Live Sweepstake Tracker</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      padding: 40px;
    }

    h1 {
      margin-bottom: 30px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
      overflow: hidden;
    }

    th {
      background: rgba(255,255,255,0.1);
      padding: 14px;
      text-align: left;
    }

    td {
      padding: 14px;
      border-top: 1px solid rgba(255,255,255,0.08);
      vertical-align: middle;
    }

    tr:hover {
      background: rgba(255,255,255,0.03);
    }

    .teamCell {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .flag {
      width: 26px;
      height: 18px;
      border-radius: 3px;
      object-fit: cover;
      box-shadow: 0 0 2px rgba(0,0,0,0.4);
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
    }

    button {
      padding: 10px 16px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: #3b82f6;
      color: white;
    }
  </style>
</head>

<body>

<div class="topbar">
  <h1>📊 Live World Cup Tracker</h1>
  <button onclick="goBack()">Back To Draw</button>
</div>

<table>
  <thead>
    <tr>
      <th>Person</th>
      <th>Team 1</th>
      <th>Goals Conceded</th>
      <th>Team 2</th>
      <th>Goals Conceded</th>
    </tr>
  </thead>

  <tbody id="trackerBody"></tbody>
</table>

<script>

const results = JSON.parse(localStorage.getItem("sweepstakeResults")) || {};

const API_BASE = "https://api-football.12heolh.workers.dev";
const SEASON = 2022;

/* 🌍 FLAGS */
const flags = {
  "Argentina":"ar","Brazil":"br","England":"gb-eng","France":"fr",
  "Germany":"de","Spain":"es","Portugal":"pt","Netherlands":"nl",
  "USA":"us","Mexico":"mx","Canada":"ca","Belgium":"be",
  "Croatia":"hr","Switzerland":"ch","Denmark":"dk","Austria":"at",
  "Serbia":"rs","Ukraine":"ua","Turkey":"tr","Poland":"pl",
  "Morocco":"ma","Senegal":"sn","Nigeria":"ng","Egypt":"eg",
  "Ghana":"gh","Cameroon":"cm","Algeria":"dz","Ivory Coast":"ci",
  "Japan":"jp","South Korea":"kr","Iran":"ir","Saudi Arabia":"sa",
  "Qatar":"qa","Australia":"au","Uzbekistan":"uz","Iraq":"iq",
  "Panama":"pa","Haiti":"ht","Curaçao":"cw","Cape Verde":"cv",
  "DR Congo":"cd","Tunisia":"tn","Uruguay":"uy","Costa Rica":"cr",
  "Jordan":"jo","Honduras":"hn","New Zealand":"nz","Jamaica":"jm",
  "El Salvador":"sv","South Africa":"za"
};

function flag(team){
  const code = flags[team];
  return code ? `https://flagcdn.com/w40/${code}.png` : "";
}

/* CACHE */
const concededCache = {};

/* SAFE FETCH */
async function safeFetch(url){
  try {
    const res = await fetch(url);
    return await res.json();
  } catch (e) {
    console.error("Fetch failed:", url, e);
    return { response: [] };
  }
}

/* GOALS CONCEDED */
async function getGoalsConceded(teamName){

  if(!teamName || teamName === "N/A") return 0;

  if(concededCache[teamName] !== undefined){
    return concededCache[teamName];
  }

  const teamData = await safeFetch(
    `${API_BASE}?endpoint=teams&search=${encodeURIComponent(teamName)}`
  );

  console.log("TEAM DATA", teamName, teamData);
  
  if(!teamData.response?.length){
    concededCache[teamName] = 0;
    return 0;
  }

  const teamId = teamData.response[0].team.id;

  const fixturesData = await safeFetch(
    `${API_BASE}?endpoint=fixtures&team=${teamId}&season=${SEASON}`
  );

  let conceded = 0;

  (fixturesData.response || []).forEach(match => {
    if(match.teams.home.id === teamId){
      conceded += match.goals.away || 0;
    } else {
      conceded += match.goals.home || 0;
    }
  });

  concededCache[teamName] = conceded;
  return conceded;
}

/* BUILD TABLE */
const tbody = document.getElementById("trackerBody");

async function buildTable(){

 const allConceded = await getAllGoalsConceded();

const enriched = [];

for(const name of Object.keys(results)){

  const team1 = results[name]?.team1 || "N/A";
  const team2 = results[name]?.team2 || "N/A";

  const conceded1 = allConceded[team1] || 0;
  const conceded2 = allConceded[team2] || 0;

    enriched.push({
      name,
      team1,
      team2,
      conceded1,
      conceded2
    });
  }

  enriched.sort((a, b) =>
    (b.conceded1 + b.conceded2) - (a.conceded1 + a.conceded2)
  );

  tbody.innerHTML = "";

  enriched.forEach(row => {

    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${row.name}</td>

      <td>
        <div class="teamCell">
          <img class="flag" src="${flag(row.team1)}">
          <span>${row.team1}</span>
        </div>
      </td>

      <td>${row.conceded1}</td>

      <td>
        <div class="teamCell">
          ${row.team2 === "N/A"
            ? `<span>N/A</span>`
            : `<img class="flag" src="${flag(row.team2)}"><span>${row.team2}</span>`
          }
        </div>
      </td>

      <td>${row.conceded2}</td>
    `;

    tbody.appendChild(tr);
  });
}

buildTable();

function goBack(){
  window.location.href = "index.html";
}

</script>

</body>
</html>
