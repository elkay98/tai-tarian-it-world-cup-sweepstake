<!DOCTYPE html>
<html>
<head>
  <title>Live Sweepstake Tracker</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      padding: 40px;
    }

    h1 {
      margin-bottom: 30px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
      overflow: hidden;
    }

    th {
      background: rgba(255,255,255,0.1);
      padding: 14px;
      text-align: left;
    }

    td {
      padding: 14px;
      border-top: 1px solid rgba(255,255,255,0.08);
    }

    tr:hover {
      background: rgba(255,255,255,0.03);
    }

    .goals {
      font-weight: bold;
      text-align: center;
    }

    .controls {
      margin-bottom: 20px;
    }

    button {
      padding: 10px 16px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: #3b82f6;
      color: white;
      margin-right: 10px;
    }

    input {
      width: 70px;
      padding: 6px;
      border-radius: 6px;
      border: none;
      text-align: center;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
    }

    .total {
      font-weight: bold;
      font-size: 18px;
    }
  </style>
</head>

<body>

<div class="topbar">

  <h1>📊 Live World Cup Tracker</h1>

  <button onclick="goBack()">
    Back To Draw
  </button>

</div>

<div class="controls">

  <button onclick="saveGoals()">
    Save Goals
  </button>

  <button onclick="resetGoals()">
    Reset Goals
  </button>

</div>

<table>

  <thead>

    <tr>
      <th>Person</th>
      <th>Team 1</th>
      <th>Team 2</th>
      <th>Goals Conceded (Team 1)</th>
      <th>Goals Conceded (Team 2)</th>
      <th>Total Goals Conceded</th>
    </tr>

  </thead>

  <tbody id="trackerBody"></tbody>

</table>

<script>
const results = JSON.parse(
  localStorage.getItem("sweepstakeResults")
);

let savedGoals = JSON.parse(
  localStorage.getItem("goalsConceded")
) || {};

const tbody =
  document.getElementById("trackerBody");

Object.keys(results)
  .sort()
  .forEach(name => {

    const team1Goals =
      savedGoals[name]?.team1 || 0;

    const team2Goals =
      savedGoals[name]?.team2 || 0;

    const total =
      team1Goals + team2Goals;

    const row =
      document.createElement("tr");

    row.innerHTML = `
      <td>${name}</td>

      <td>${results[name].team1}</td>

      <td>${results[name].team2}</td>

      <td class="goals">

        <input
          type="number"
          min="0"
          value="${team1Goals}"
          id="team1-${name}"
          onchange="updateTotal('${name}')"
        >

      </td>

      <td class="goals">

        <input
          type="number"
          min="0"
          value="${team2Goals}"
          id="team2-${name}"
          onchange="updateTotal('${name}')"
        >

      </td>

      <td
        class="total"
        id="total-${name}"
      >
        ${total}
      </td>
    `;

    tbody.appendChild(row);
  });

/* ➕ LIVE TOTAL UPDATE */
function updateTotal(name){

  const t1 =
    parseInt(
      document.getElementById(
        "team1-" + name
      ).value
    ) || 0;

  const t2 =
    parseInt(
      document.getElementById(
        "team2-" + name
      ).value
    ) || 0;

  document.getElementById(
    "total-" + name
  ).innerText = t1 + t2;
}

/* 💾 SAVE GOALS */
function saveGoals(){

  Object.keys(results)
    .forEach(name => {

      const team1 =
        parseInt(
          document.getElementById(
            "team1-" + name
          ).value
        ) || 0;

      const team2 =
        parseInt(
          document.getElementById(
            "team2-" + name
          ).value
        ) || 0;

      savedGoals[name] = {
        team1,
        team2
      };
    });

  localStorage.setItem(
    "goalsConceded",
    JSON.stringify(savedGoals)
  );

  alert("Goals saved");
}

/* 🧨 RESET GOALS */
function resetGoals(){

  if(!confirm("Reset all goals?")) return;

  Object.keys(results)
    .forEach(name => {

      document.getElementById(
        "team1-" + name
      ).value = 0;

      document.getElementById(
        "team2-" + name
      ).value = 0;

      document.getElementById(
        "total-" + name
      ).innerText = 0;

    });

  savedGoals = {};

  localStorage.removeItem(
    "goalsConceded"
  );

  alert("Goals reset");
}

/* 🔙 BACK */
function goBack(){

  window.location.href = "index.html";
}
</script>

</body>
</html>
