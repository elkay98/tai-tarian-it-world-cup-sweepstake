<!DOCTYPE html>
<html>
<head>
  <title>Tracker</title>
</head>

<body>

<h1>Team Tracker</h1>

<button onclick="load()">Refresh</button>

<div id="output"></div>

<script>
let data = null;

async function load() {
  const res = await fetch("./teams.json");
  data = await res.json();

  let html = "";

  data.people.forEach(p => {
    html += "<h3>" + p.name + "</h3>";

    if (p.teams.length === 0) {
      html += "<p>No teams yet</p>";
    } else {
      html += "<ul>";
      p.teams.forEach(t => {
        html += "<li>" + t + "</li>";
      });
      html += "</ul>";
    }
  });

  document.getElementById("output").innerHTML = html;
}

load();
</script>

</body>
</html>
