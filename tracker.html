<!DOCTYPE html>
<html>
<head>
  <title>Live Sweepstake Tracker</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      padding: 40px;
    }

    h1 {
      margin-bottom: 30px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
      overflow: hidden;
    }

    th {
      background: rgba(255,255,255,0.1);
      padding: 14px;
      text-align: left;
    }

    td {
      padding: 14px;
      border-top: 1px solid rgba(255,255,255,0.08);
      vertical-align: middle;
    }

    tr:hover {
      background: rgba(255,255,255,0.03);
    }

    input {
      width: 80px;
      padding: 6px;
      border-radius: 6px;
      border: none;
      text-align: center;
    }

    .controls {
      margin-bottom: 20px;
    }

    button {
      padding: 10px 16px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: #3b82f6;
      color: white;
      margin-right: 10px;
    }

    .teamCell {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .flag {
      width: 26px;
      height: 18px;
      border-radius: 3px;
      object-fit: cover;
      box-shadow: 0 0 2px rgba(0,0,0,0.4);
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
    }
  </style>
</head>

<body>

<div class="topbar">
  <h1>📊 Live World Cup Tracker</h1>
  <button onclick="goBack()">Back To Draw</button>
</div>

<div class="controls">
  <button onclick="saveGoals()">Save Goals</button>
  <button onclick="resetGoals()">Reset Goals</button>
</div>

<table>

  <thead>
    <tr>
      <th>Person</th>
      <th>Team 1</th>
      <th>Goals Conceded</th>
      <th>Team 2</th>
      <th>Goals Conceded</th>
</tr>
  </thead>

  <tbody id="trackerBody"></tbody>

</table>

<script>

const results = JSON.parse(
  localStorage.getItem("sweepstakeResults")
);

let savedGoals = JSON.parse(
  localStorage.getItem("goalsConceded")
) || {};

/* 🌍 FLAG MAP (ISO → FlagCDN code) */
const flags = {
  "Argentina":"ar",
  "Brazil":"br",
  "England":"gb-eng",
  "France":"fr",
  "Germany":"de",
  "Spain":"es",
  "Portugal":"pt",
  "Netherlands":"nl",
  "USA":"us",
  "Mexico":"mx",
  "Canada":"ca",
  "Belgium":"be",
  "Croatia":"hr",
  "Switzerland":"ch",
  "Denmark":"dk",
  "Austria":"at",
  "Serbia":"rs",
  "Ukraine":"ua",
  "Turkey":"tr",
  "Poland":"pl",
  "Morocco":"ma",
  "Senegal":"sn",
  "Nigeria":"ng",
  "Egypt":"eg",
  "Ghana":"gh",
  "Cameroon":"cm",
  "Algeria":"dz",
  "Ivory Coast":"ci",
  "Japan":"jp",
  "South Korea":"kr",
  "Iran":"ir",
  "Saudi Arabia":"sa",
  "Qatar":"qa",
  "Australia":"au",
  "Uzbekistan":"uz",
  "Iraq":"iq",
  "Panama":"pa",
  "Haiti":"ht",
  "Curaçao":"cw",
  "Cape Verde":"cv",
  "DR Congo":"cd",
  "Tunisia":"tn",
  "Uruguay":"uy",
  "Costa Rica":"cr",
  "Jordan":"jo",
  "Honduras":"hn",
  "New Zealand":"nz",
  "Jamaica":"jm",
  "El Salvador":"sv",
  "South Africa":"za"
};

function flag(team){
  const code = flags[team];
  return code
    ? `https://flagcdn.com/w40/${code}.png`
    : "";
}

const tbody = document.getElementById("trackerBody");

Object.keys(results)
  .sort()
  .forEach(name => {

    const t1 = savedGoals[name]?.team1 || 0;
    const t2 = savedGoals[name]?.team2 || 0;

    const team1 = results[name].team1;
    const team2 = results[name].team2 || "N/A";

    const row = document.createElement("tr");

    row.innerHTML = `
  <td>${name}</td>

  <!-- TEAM 1 -->
  <td>
    <div class="teamCell">
      <img class="flag" src="${flag(team1)}">
      <span>${team1}</span>
    </div>
  </td>

  <td>
    <input type="number" id="t1-${name}" value="${t1}" min="0">
  </td>

  <!-- TEAM 2 -->
  <td>
    <div class="teamCell">
      ${team2 === "N/A"
        ? `<span>N/A</span>`
        : `<img class="flag" src="${flag(team2)}"><span>${team2}</span>`
      }
    </div>
  </td>

  <td>
    ${
      team2 === "N/A"
        ? "—"
        : `<input type="number" id="t2-${name}" value="${t2}" min="0">`
    }
  </td>
`;

    tbody.appendChild(row);
  });

/* 💾 SAVE */
function saveGoals(){

  Object.keys(results).forEach(name => {

    const t1 = parseInt(
      document.getElementById("t1-" + name).value
    ) || 0;

    const t2 = parseInt(
      document.getElementById("t2-" + name).value
    ) || 0;

    savedGoals[name] = {
      team1: t1,
      team2: t2
    };

  });

  localStorage.setItem(
    "goalsConceded",
    JSON.stringify(savedGoals)
  );

  alert("Goals saved");
}

/* 🔁 RESET */
function resetGoals(){

  if(!confirm("Reset all goals?")) return;

  Object.keys(results).forEach(name => {

    document.getElementById("t1-" + name).value = 0;
    document.getElementById("t2-" + name).value = 0;

  });

  savedGoals = {};

  localStorage.removeItem("goalsConceded");

  alert("Goals reset");
}

/* 🔙 BACK */
function goBack(){
  window.location.href = "index.html";
}

</script>

</body>
</html>
