<!DOCTYPE html>
<html>
<head>
  <title>Live Sweepstake Tracker</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      padding: 40px;
    }

    h1 {
      margin-bottom: 30px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
      overflow: hidden;
    }

    th {
      background: rgba(255,255,255,0.1);
      padding: 14px;
      text-align: left;
    }

    td {
      padding: 14px;
      border-top: 1px solid rgba(255,255,255,0.08);
      vertical-align: middle;
    }

    tr:hover {
      background: rgba(255,255,255,0.03);
    }

    .teamCell {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .flag {
      width: 26px;
      height: 18px;
      border-radius: 3px;
      object-fit: cover;
      box-shadow: 0 0 2px rgba(0,0,0,0.4);
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
    }

    button {
      padding: 10px 16px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: #3b82f6;
      color: white;
    }
  </style>
</head>

<body>

<div class="topbar">

<div id="leaderBanner" style="
  margin-bottom: 20px;
  padding: 14px 18px;
  border-radius: 12px;
  background: linear-gradient(90deg, #f59e0b, #ef4444);
  color: white;
  font-weight: bold;
  font-size: 16px;
  display: none;
">
  🏆 Current Leader: Loading...
</div>
  
  <h1>📊 Live World Cup Tracker</h1>
  <button onclick="goBack()">Back To Draw</button>
</div>

<table>
  <thead>
    <tr>
      <th>Person</th>
      <th>Team 1</th>
      <th>Goals Conceded</th>
      <th>Team 2</th>
      <th>Goals Conceded</th>
    </tr>
  </thead>

  <tbody id="trackerBody"></tbody>
</table>

<script type="module">

const results = await fetch("draw.json")
  .then(r => r.json());

console.log("DRAW LOADED", results);

const API_BASE = "https://api-football.12heolh.workers.dev";

/* ================================
   🔧 NAME NORMALISATION FIX
================================ */
const nameMap = {
  "Czech Republic": "Czechia",
  "United States": "USA",
  "Bosnia and Herzegovina": "Bosnia & Herzegovina"
};

function normalise(name) {
  return nameMap[name] || name;
}

/* 🌍 FLAGS */
const flags = {
  "Argentina": "ar",
  "Brazil": "br",
  "England": "gb-eng",
  "France": "fr",
  "Germany": "de",
  "Spain": "es",
  "Portugal": "pt",
  "Netherlands": "nl",

  "Belgium": "be",
  "Croatia": "hr",
  "Uruguay": "uy",
  "Switzerland": "ch",
  "Czechia": "cz",
  "Austria": "at",
  "Ecuador": "ec",
  "Scotland": "gb-sct",
  "Turkey": "tr",
  "Sweden": "se",
  "USA": "us",
  "Mexico": "mx",
  "Canada": "ca",
  "Morocco": "ma",
  "Senegal": "sn",
  "Norway": "no",
  "Egypt": "eg",
  "Ghana": "gh",
  "Bosnia & Herzegovina": "ba",
  "Algeria": "dz",
  "Ivory Coast": "ci",
  "South Africa": "za",
  "Japan": "jp",
  "South Korea": "kr",
  "Iran": "ir",
  "Saudi Arabia": "sa",
  "Qatar": "qa",
  "Australia": "au",
  "Jordan": "jo",
  "Colombia": "co",
  "Paraguay": "py",
  "New Zealand": "nz",

  "Uzbekistan": "uz",
  "Iraq": "iq",
  "Panama": "pa",
  "Haiti": "ht",
  "Curaçao": "cw",
  "Cape Verde": "cv",
  "DR Congo": "cd",
  "Tunisia": "tn"
};

function flag(team){
  const code = flags[team];
  return code ? `https://flagcdn.com/w40/${code}.png` : "";
}

/* SAFE FETCH */
async function safeFetch(url){
  try {
    const res = await fetch(url);
    return await res.json();
  } catch (e) {
    console.error("Fetch failed:", url, e);
    return { games: [] };
  }
}

/* BUILD TABLE */
const tbody = document.getElementById("trackerBody");

async function getAllGoalsConceded(){

  const fixturesData = await safeFetch(
    "https://worldcup26.ir/get/games"
  );

  console.log("FIXTURES RESPONSE", fixturesData);

  const conceded = {};

  (fixturesData.games || []).forEach(match => {

    const home = normalise(match.home_team_name_en);
    const away = normalise(match.away_team_name_en);

    const homeGoals = Number(match.home_score) || 0;
    const awayGoals = Number(match.away_score) || 0;

    if (!conceded[home]) conceded[home] = 0;
    if (!conceded[away]) conceded[away] = 0;

    conceded[home] += awayGoals;
    conceded[away] += homeGoals;
  });

  return conceded;
}

async function buildTable(){

  const allConceded = await getAllGoalsConceded();

  const enriched = [];

  for(const name of Object.keys(results)){

    const team1 = normalise(results[name]?.team1 || "N/A");
    const team2 = normalise(results[name]?.team2 || "N/A");

    const conceded1 = allConceded[team1] || 0;
    const conceded2 = allConceded[team2] || 0;

    enriched.push({
      name,
      team1,
      team2,
      conceded1,
      conceded2
    });
  }

  enriched.sort((a, b) =>
    (b.conceded1 + b.conceded2) - (a.conceded1 + a.conceded2)
  );

  const leaderBanner = document.getElementById("leaderBanner");

if (enriched.length > 0) {

  const topScore = enriched[0].conceded1 + enriched[0].conceded2;

  const leaders = enriched.filter(p =>
    (p.conceded1 + p.conceded2) === topScore
  );

  const leaderText = leaders.map(l => {

    const total = l.conceded1 + l.conceded2;

    const leaderTeam = (l.conceded1 >= l.conceded2) ? l.team1 : l.team2;

const teamFlag = flag(leaderTeam);

const flagHTML = teamFlag
  ? `<img src="${teamFlag}" style="width:20px;height:14px;border-radius:3px;margin:0 6px;vertical-align:middle;">`
  : "";

   return `${l.name} — ${flagHTML} ${leaderTeam}`;
  }).join(" + ");

  leaderBanner.style.display = "block";
  leaderBanner.innerHTML =
    `🏆 Current Leader(s): ${leaderText} — ${topScore} goals conceded`;
}

  tbody.innerHTML = "";

  enriched.forEach(row => {

    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${row.name}</td>

      <td>
        <div class="teamCell">
          <img class="flag" src="${flag(row.team1)}">
          <span>${row.team1}</span>
        </div>
      </td>

      <td>${row.conceded1}</td>

      <td>
        <div class="teamCell">
          ${row.team2 === "N/A"
            ? `<span>N/A</span>`
            : `<img class="flag" src="${flag(row.team2)}"><span>${row.team2}</span>`
          }
        </div>
      </td>

      <td>${row.conceded2}</td>
    `;

    tbody.appendChild(tr);
  });
}

buildTable();

function goBack(){
  window.location.href = "index.html";
}

</script>

</body>
</html>
