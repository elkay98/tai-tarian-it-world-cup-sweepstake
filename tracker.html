<!DOCTYPE html>
<html>
<head>
  <title>Live Sweepstake Tracker</title>

  <style>
    body{
      margin:0;
      padding:30px;
      background:linear-gradient(135deg,#0f172a,#1e293b);
      color:white;
      font-family:Arial,sans-serif;
    }

    h1{
      text-align:center;
      margin-bottom:25px;
    }

    table{
      width:100%;
      border-collapse:collapse;
      background:rgba(255,255,255,0.05);
      border-radius:12px;
      overflow:hidden;
    }

    th,td{
      padding:14px;
      text-align:center;
      border-bottom:1px solid rgba(255,255,255,0.08);
    }

    th{
      background:rgba(255,255,255,0.08);
    }

    tr:hover{
      background:rgba(255,255,255,0.04);
    }

    .flag{
      width:28px;
      height:20px;
      border-radius:3px;
      vertical-align:middle;
      margin-right:6px;
    }

    .updated{
      text-align:center;
      margin-top:20px;
      opacity:0.7;
      font-size:14px;
    }
  </style>
</head>

<body>

<h1>⚽ T&I World Cup 2026 Live Tracker</h1>

<table>

  <thead>
    <tr>
      <th>Person</th>
      <th>Team 1</th>
      <th>Goals Conceded</th>
      <th>Team 2</th>
      <th>Goals Conceded</th>
    </tr>
  </thead>

  <tbody id="trackerBody"></tbody>

</table>

<div class="updated" id="updatedText"></div>

<script>

/* ---------------- CONFIG ---------------- */

const API_KEY = "PASTE_YOUR_KEY_HERE";

const CACHE_KEY = "wc_auto_stats_cache";
const CACHE_TIME = "wc_auto_stats_time";

const ONE_HOUR = 1000 * 60 * 60;

/* ---------------- DATA ---------------- */

const results =
  JSON.parse(localStorage.getItem("sweepstakeResults") || "{}");

/* ---------------- CACHE ---------------- */

let statsCache = {};

/* ---------------- GET TEAM ID ---------------- */

async function getTeamId(name){

  const res = await fetch(
    `https://v3.football.api-sports.io/teams?search=${encodeURIComponent(name)}`,
    { headers: { "x-apisports-key": API_KEY } }
  );

  const data = await res.json();

  if(data.response.length === 0) return null;

  return data.response[0].team.id;
}

/* ---------------- GET GOALS CONCEDED ---------------- */

async function getGoalsConceded(teamName){

  const teamId = await getTeamId(teamName);

  if(!teamId) return "-";

  const res = await fetch(
    `https://v3.football.api-sports.io/teams/statistics?team=${teamId}&league=1&season=2026`,
    { headers: { "x-apisports-key": API_KEY } }
  );

  const data = await res.json();

  try{
    return data.response.goals.against.total;
  } catch(e){
    return "-";
  }
}

/* ---------------- LOAD ALL STATS ---------------- */

async function loadStats(){

  const cached = localStorage.getItem(CACHE_KEY);
  const cachedTime = localStorage.getItem(CACHE_TIME);

  if(cached && cachedTime){

    if(Date.now() - cachedTime < ONE_HOUR){

      statsCache = JSON.parse(cached);

      render();

      document.getElementById("updatedText").innerText =
        "Using cached data";

      return;
    }
  }

  const names = new Set();

  Object.values(results).forEach(r=>{
    names.add(r.team1);
    names.add(r.team2);
  });

  for(let team of names){

    statsCache[team] = await getGoalsConceded(team);

  }

  localStorage.setItem(CACHE_KEY, JSON.stringify(statsCache));
  localStorage.setItem(CACHE_TIME, Date.now());

  render();

  document.getElementById("updatedText").innerText =
    "Live data updated from API";
}

/* ---------------- RENDER ---------------- */

function render(){

  const body = document.getElementById("trackerBody");
  body.innerHTML = "";

  Object.keys(results).sort().forEach(name => {

    const r = results[name];

    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${name}</td>

      <td>${r.team1}</td>
      <td>${statsCache[r.team1] ?? "-"}</td>

      <td>${r.team2}</td>
      <td>${statsCache[r.team2] ?? "-"}</td>
    `;

    body.appendChild(tr);

  });
}

/* ---------------- START ---------------- */

loadStats();

</script>

</body>
</html>
