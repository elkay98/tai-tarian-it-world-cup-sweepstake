<!DOCTYPE html>
<html>
<head>
  <title>Live Sweepstake Tracker</title>

  <style>
    body{
      margin:0;
      padding:30px;
      background:linear-gradient(135deg,#0f172a,#1e293b);
      color:white;
      font-family:Arial,sans-serif;
    }

    h1{
      text-align:center;
      margin-bottom:25px;
    }

    table{
      width:100%;
      border-collapse:collapse;
      background:rgba(255,255,255,0.05);
      border-radius:12px;
      overflow:hidden;
    }

    th,td{
      padding:14px;
      text-align:center;
      border-bottom:1px solid rgba(255,255,255,0.08);
    }

    th{
      background:rgba(255,255,255,0.08);
    }

    tr:hover{
      background:rgba(255,255,255,0.04);
    }

    .flag{
      width:28px;
      height:20px;
      border-radius:3px;
      vertical-align:middle;
      margin-right:6px;
    }

    .updated{
      text-align:center;
      margin-top:20px;
      opacity:0.7;
      font-size:14px;
    }
  </style>
</head>

<body>

<h1>⚽ T&I World Cup 2026 Live Tracker</h1>

<table>

  <thead>
    <tr>
      <th>Person</th>
      <th>Team 1</th>
      <th>Goals Conceded</th>
      <th>Team 2</th>
      <th>Goals Conceded</th>
    </tr>
  </thead>

  <tbody id="trackerBody"></tbody>

</table>

<div class="updated" id="updatedText"></div>

<script>

/* -------------------------------- */
/* API SETTINGS */
/* -------------------------------- */

const API_KEY = "801b4bdc2128ca227818ab361372734f";

/* -------------------------------- */
/* FLAGS */
/* -------------------------------- */

const flags = {
  "Argentina":"ar","Brazil":"br","England":"gb-eng","France":"fr",
  "Germany":"de","Spain":"es","Portugal":"pt","Netherlands":"nl",
  "USA":"us","Mexico":"mx","Canada":"ca","Belgium":"be",
  "Croatia":"hr","Switzerland":"ch","Denmark":"dk","Austria":"at",
  "Serbia":"rs","Ukraine":"ua","Turkey":"tr","Poland":"pl",
  "Morocco":"ma","Senegal":"sn","Nigeria":"ng","Egypt":"eg",
  "Ghana":"gh","Cameroon":"cm","Algeria":"dz","Ivory Coast":"ci",
  "Japan":"jp","South Korea":"kr","Iran":"ir","Saudi Arabia":"sa",
  "Qatar":"qa","Australia":"au","Uzbekistan":"uz","Iraq":"iq",
  "Panama":"pa","Haiti":"ht","Curaçao":"cw","Cape Verde":"cv",
  "DR Congo":"cd","Tunisia":"tn"
};

function getFlag(team){

  const code = flags[team];

  if(!code) return "";

  return `<img class="flag" src="https://flagcdn.com/w40/${code}.png">`;
}

/* -------------------------------- */
/* LOAD DRAW RESULTS */
/* -------------------------------- */

const results =
  JSON.parse(localStorage.getItem("sweepstakeResults") || "{}");

/* -------------------------------- */
/* GOALS CACHE */
/* -------------------------------- */

let concededData = {};

/* -------------------------------- */
/* CACHE CHECK */
/* -------------------------------- */

const CACHE_KEY = "worldCupGoalsCache";
const CACHE_TIME_KEY = "worldCupGoalsCacheTime";

const ONE_HOUR = 1000 * 60 * 60;

/* -------------------------------- */
/* TEAM NAME MAPPING */
/* -------------------------------- */

const apiNames = {
  "USA":"United States",
  "South Korea":"Korea Republic",
  "DR Congo":"Congo DR"
};

/* -------------------------------- */
/* LOAD DATA */
/* -------------------------------- */

async function loadGoalsData(){

  const cached = localStorage.getItem(CACHE_KEY);
  const cacheTime = localStorage.getItem(CACHE_TIME_KEY);

  if(cached && cacheTime){

    const age = Date.now() - Number(cacheTime);

    if(age < ONE_HOUR){

      concededData = JSON.parse(cached);

      renderTable();

      document.getElementById("updatedText").innerText =
        "Using cached data";

      return;
    }
  }

  try{

    /* -------------------------------- */
    /* WORLD CUP STANDINGS */
    /* -------------------------------- */

    const response = await fetch(
      "https://v3.football.api-sports.io/standings?league=1&season=2026",
      {
        headers:{
          "x-apisports-key": API_KEY
        }
      }
    );

    const data = await response.json();

    const standings = data.response[0].league.standings.flat();

    standings.forEach(team => {

      concededData[team.team.name] =
        team.all.goals.against;

    });

    localStorage.setItem(
      CACHE_KEY,
      JSON.stringify(concededData)
    );

    localStorage.setItem(
      CACHE_TIME_KEY,
      Date.now()
    );

    renderTable();

    document.getElementById("updatedText").innerText =
      "Live data updated";

  }
  catch(err){

    console.error(err);

    renderTable();

    document.getElementById("updatedText").innerText =
      "Could not update live data";

  }
}

/* -------------------------------- */
/* GET CONCEDED */
/* -------------------------------- */

function getConceded(team){

  const mapped = apiNames[team] || team;

  return concededData[mapped] ?? "-";
}

/* -------------------------------- */
/* RENDER */
/* -------------------------------- */

function renderTable(){

  const body =
    document.getElementById("trackerBody");

  body.innerHTML = "";

  const names =
    Object.keys(results).sort();

  names.forEach(name => {

    const r = results[name];

    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${name}</td>

      <td>
        ${getFlag(r.team1)}
        ${r.team1}
      </td>

      <td>
        ${getConceded(r.team1)}
      </td>

      <td>
        ${getFlag(r.team2)}
        ${r.team2}
      </td>

      <td>
        ${getConceded(r.team2)}
      </td>
    `;

    body.appendChild(tr);

  });
}

/* -------------------------------- */
/* START */
/* -------------------------------- */

loadGoalsData();

</script>

</body>
</html>
